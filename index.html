<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>See Jay — Market Intelligence v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f7f4;--bg3:#f1efe8;
  --text:#1a1a18;--text2:#5c5c58;--text3:#9c9a92;
  --border:#e8e6de;--border2:#d3d1c7;
  --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-d:#085041;
  --coral:#D85A30;--coral-l:#FAECE7;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --red:#E24B4A;--red-l:#FCEBEB;
  --green:#3B6D11;--green-l:#EAF3DE;
  --gray:#5F5E5A;--gray-l:#F1EFE8;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
    --text:#e8e6de;--text2:#b4b2a9;--text3:#6c6a62;
    --border:#3a3a36;--border2:#4a4a46;
    --purple-l:#26215C;--teal-l:#04342C;--coral-l:#4A1B0C;
    --amber-l:#412402;--blue-l:#042C53;--red-l:#501313;--green-l:#173404;--gray-l:#2C2C2A;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{font-weight:700;font-size:15px;color:var(--purple);white-space:nowrap}
.logo span{color:var(--text2);font-weight:400}
.logo sub{font-size:10px;color:var(--text3)}
.nav{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap}
.nav-btn{padding:5px 10px;border-radius:var(--radius);border:none;background:none;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--purple-l);color:var(--purple);font-weight:500}
.saved{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--teal-l);color:var(--teal);display:none}
.view{display:none;padding:16px;max-width:1200px;margin:0 auto}
.view.active{display:block}
select,input[type=text],input[type=number]{font-size:12px;height:28px;padding:0 8px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text)}
button{font-size:12px;height:28px;padding:0 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer}
button:hover{background:var(--bg3)}
.btn-p{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-p:hover{background:var(--purple-d)}
.btn-d{color:var(--red);border-color:var(--red)}
.tb{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-top:10px;display:none}
.panel.open{display:block}
.panel h3{font-size:13px;font-weight:600;margin-bottom:10px}
.f{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.f label{font-size:11px;color:var(--text2);width:100px;flex-shrink:0}
.f input,.f select,.f textarea{flex:1;min-width:100px}
.f input[type=range]{padding:0}
.f textarea{min-height:50px;resize:vertical;padding:6px 8px;font-size:12px}
.sv{font-size:11px;min-width:24px;text-align:right;color:var(--text2)}
.br{display:flex;gap:6px;margin-top:10px}
/* MAP */
#mwrap{position:relative;width:100%;padding-bottom:62%;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:8px}
#mc{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}
.mc-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.mc-row label{font-size:11px;color:var(--text2);white-space:nowrap}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* SCORES */
.sc-list{display:flex;flex-direction:column;gap:6px}
.sc-item{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.sc-item.self{border-color:var(--red);border-width:2px}
.sc-hd{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;background:var(--bg2)}
.sc-hd:hover{background:var(--bg3)}
.sc-nm{font-weight:600;flex:1;font-size:13px}
.sc-tot{font-size:12px;font-weight:700;min-width:38px;text-align:right}
.sc-bd{padding:12px;display:none;border-top:1px solid var(--border)}
.sc-bd.open{display:block}
.bar-r{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.bar-l{font-size:11px;color:var(--text2);width:100px;flex-shrink:0}
.bar-t{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px}
.bar-v{font-size:11px;font-weight:600;min-width:22px;text-align:right}
.memo{font-size:11px;color:var(--text2);margin-top:7px;padding-top:7px;border-top:1px solid var(--border);line-height:1.5}
.src{font-size:10px;color:var(--text3);margin-top:2px}
.tag-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:10px;padding:1px 7px;border-radius:20px;border:1px solid;display:inline-block}
/* AXES */
.ax-list{display:flex;flex-direction:column;gap:8px}
.ax-card{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.ax-hd{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2)}
.ax-id{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.ax-nm{font-weight:600;flex:1}
.ax-ds{font-size:11px;color:var(--text2);padding:7px 12px;line-height:1.5}
.bands{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:6px 12px 10px}
.band{padding:5px 8px;border-radius:var(--radius);font-size:11px;line-height:1.4}
.blo{background:var(--gray-l);color:var(--gray)}.bmi{background:var(--amber-l);color:var(--amber)}.bhi{background:var(--teal-l);color:var(--teal-d)}
.bl{font-weight:600;font-size:10px;margin-bottom:2px}
.ax-bs{font-size:10px;color:var(--text3);padding:0 12px 10px;white-space:pre-line;line-height:1.5}
/* MARKET */
.mk-list{display:flex;flex-direction:column;gap:6px}
.mk-node{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.mk-hd{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer}
.mk-hd:hover{background:var(--bg2)}
.mk-nm{font-weight:500;min-width:140px;flex:1}
.mk-bw{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:30px;max-width:180px}
.mk-b{height:100%;border-radius:3px}
.mk-v{font-size:12px;font-weight:600;min-width:88px;text-align:right;white-space:nowrap}
.mk-mm{font-size:10px;color:var(--text3);padding:0 12px 8px;line-height:1.4}
.mk-ch{padding-left:12px}
/* SUMMARY */
.sw{overflow-x:auto}
table.st{border-collapse:collapse;width:100%;min-width:640px;font-size:11px}
table.st th{padding:6px 8px;text-align:center;background:var(--bg2);border-bottom:2px solid var(--border);font-weight:600;white-space:nowrap}
table.st th:first-child{text-align:left;min-width:120px}
table.st td{padding:5px 8px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
table.st td:first-child{text-align:left;font-weight:500;white-space:nowrap}
table.st tr.s-row td{background:var(--red-l)}
table.st tr:hover td{background:var(--bg2)}
.cbc{display:flex;align-items:center;gap:3px;justify-content:center}
.mb{height:4px;border-radius:2px}
.ins{background:var(--purple-l);border:1px solid var(--purple);border-radius:var(--radius-lg);padding:12px 14px;font-size:12px;color:var(--purple-d);line-height:1.7;margin-top:10px}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:18px;width:92%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:700;margin-bottom:14px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--teal);color:#fff;padding:9px 16px;border-radius:var(--radius-lg);font-size:12px;font-weight:500;z-index:300;transform:translateY(60px);opacity:0;transition:all .25s}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:600px){.bands{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="header">
  <div class="logo">See Jay <span>Market Intelligence</span> <sub>v2</sub></div>
  <span class="saved" id="saved">保存済み ✓</span>
  <nav class="nav">
    <button class="nav-btn active" onclick="go('map')">マップ</button>
    <button class="nav-btn" onclick="go('scores')">競合スコア</button>
    <button class="nav-btn" onclick="go('axes')">軸の定義</button>
    <button class="nav-btn" onclick="go('market')">市場規模</button>
    <button class="nav-btn" onclick="go('summary')">サマリー</button>
  </nav>
</header>

<!-- MAP -->
<div id="view-map" class="view active">
  <div class="mc-row">
    <label>横軸</label><select id="xAx"></select>
    <label style="margin-left:6px">縦軸</label><select id="yAx"></select>
  </div>
  <div class="mc-row">
    <label>商品カテゴリ(M)</label><select id="fM"></select>
    <label style="margin-left:6px">事業モデル(N)</label><select id="fN"></select>
    <label style="margin-left:6px">カテゴリ</label><select id="fCat"></select>
    <button style="margin-left:auto" onclick="resetMap()">リセット</button>
    <button class="btn-p" onclick="openCompModal()">＋追加</button>
  </div>
  <div id="mwrap"><canvas id="mc"></canvas></div>
  <div class="legend" id="legend"></div>
</div>

<!-- SCORES -->
<div id="view-scores" class="view">
  <div class="tb">
    <select id="sc-cat" onchange="renderScores()"><option>すべて</option><option>ガイド会社</option><option>OTA/プラットフォーム</option><option>総合旅行会社・DMC</option><option>フリーランスガイド</option><option>自社</option></select>
    <select id="sc-sort" onchange="renderScores()"><option value="O">主力商品一致度順</option><option value="total">総合スコア順</option><option value="name">名前順</option></select>
    <button class="btn-p" style="margin-left:auto" onclick="openCompModal()">＋追加</button>
  </div>
  <div class="sc-list" id="sc-list"></div>
</div>

<!-- AXES -->
<div id="view-axes" class="view">
  <div class="tb"><button class="btn-p" onclick="openAxisModal()">＋軸を追加</button></div>
  <div class="ax-list" id="ax-list"></div>
</div>

<!-- MARKET -->
<div id="view-market" class="view">
  <div class="tb">
    <button class="btn-p" onclick="openMktModal()">＋市場を追加</button>
    <button onclick="mktAll(true)">すべて展開</button>
    <button onclick="mktAll(false)">折りたたむ</button>
  </div>
  <div class="mk-list" id="mk-list"></div>
</div>

<!-- SUMMARY -->
<div id="view-summary" class="view">
  <div class="sw" id="sum-tbl"></div>
  <div class="ins" id="sum-ins"></div>
</div>

<!-- COMP MODAL -->
<div class="modal-bg" id="cm-modal">
<div class="modal">
  <h2 id="cm-title">競合を追加</h2>
  <div class="f"><label>名前</label><input id="cm-name" type="text"></div>
  <div class="f"><label>カテゴリ</label><select id="cm-cat"><option>ガイド会社</option><option>OTA/プラットフォーム</option><option>総合旅行会社・DMC</option><option>フリーランスガイド</option><option>手配業者</option><option>自社</option></select></div>
  <div class="f"><label>M 商品カテゴリ</label><select id="cm-M"><option>半日〜1日プライベートツアー</option><option>ガイドのみ</option><option>複数日カスタムツアー</option><option>総合手配</option><option>体験商品中心</option><option>パッケージツアー</option><option>マーケットプレイス型</option><option>法人/旅行会社向け手配</option><option>その他</option></select></div>
  <div class="f"><label>N 事業モデル</label><select id="cm-N"><option>B2B受託型</option><option>B2C直販型</option><option>OTA依存型</option><option>マーケットプレイス型</option><option>総合旅行手配型</option><option>ハイブリッド型</option></select></div>
  <div id="cm-sliders"></div>
  <div class="f"><label>メモ</label><textarea id="cm-memo"></textarea></div>
  <div class="f"><label>出典</label><input id="cm-src" type="text" placeholder="URL・資料名"></div>
  <div class="br">
    <button class="btn-p" onclick="saveComp()">保存</button>
    <button onclick="closeCompModal()">キャンセル</button>
    <button class="btn-d" id="cm-del" style="display:none;margin-left:auto" onclick="delComp()">削除</button>
  </div>
</div>
</div>

<!-- AXIS MODAL -->
<div class="modal-bg" id="am-modal">
<div class="modal">
  <h2 id="am-title">軸を追加</h2>
  <div class="f"><label>ID</label><input id="am-id" type="text" maxlength="2" style="width:50px;flex:none"></div>
  <div class="f"><label>軸名</label><input id="am-name" type="text"></div>
  <div class="f"><label>説明</label><input id="am-desc" type="text"></div>
  <div class="f"><label>低（0〜30）</label><input id="am-lo" type="text"></div>
  <div class="f"><label>中（31〜65）</label><input id="am-mid" type="text"></div>
  <div class="f"><label>高（66〜100）</label><input id="am-hi" type="text"></div>
  <div class="f"><label>判断指標</label><textarea id="am-basis"></textarea></div>
  <div class="br">
    <button class="btn-p" onclick="saveAxis()">保存</button>
    <button onclick="closeAxisModal()">キャンセル</button>
    <button class="btn-d" id="am-del" style="display:none;margin-left:auto" onclick="delAxis()">削除</button>
  </div>
</div>
</div>

<!-- MARKET MODAL -->
<div class="modal-bg" id="mm-modal">
<div class="modal">
  <h2 id="mm-title">市場を追加</h2>
  <div class="f"><label>市場名</label><input id="mm-name" type="text"></div>
  <div class="f"><label>規模（億円）</label><input id="mm-val" type="number" placeholder="0=要調査"></div>
  <div class="f"><label>種別</label><select id="mm-type"><option value="TAM">TAM</option><option value="SAM">SAM</option><option value="SOM">実戦用市場</option><option value="sub">サブ市場</option></select></div>
  <div class="f"><label>親市場</label><select id="mm-parent"><option value="">なし（トップ）</option></select></div>
  <div class="f"><label>ステータス</label><select id="mm-status"><option value="confirmed">確定値</option><option value="estimated">推計値</option><option value="todo">要調査</option></select></div>
  <div class="f"><label>See Jay関連</label><select id="mm-sj"><option value="">-</option><option value="current">現在の主戦場</option><option value="target">狙える市場</option></select></div>
  <div class="f"><label>メモ・出典</label><input id="mm-memo" type="text"></div>
  <div class="br">
    <button class="btn-p" onclick="saveMkt()">保存</button>
    <button onclick="closeMktModal()">キャンセル</button>
    <button class="btn-d" id="mm-del" style="display:none;margin-left:auto" onclick="delMkt()">削除</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const CC={'ガイド会社':'#1D9E75','OTA/プラットフォーム':'#BA7517','総合旅行会社・DMC':'#534AB7','フリーランスガイド':'#888780','手配業者':'#185FA5','自社':'#E24B4A'};
const TC={TAM:'#534AB7',SAM:'#1D9E75',SOM:'#D85A30',sub:'#888780'};
const TL={TAM:'TAM',SAM:'SAM',SOM:'実戦',sub:'サブ'};
const SL={confirmed:'確定',estimated:'推計',todo:'要調査'};
const SC={confirmed:'#1D9E75',estimated:'#BA7517',todo:'#888780'};

// M tag colors
const MC_COL={'半日〜1日プライベートツアー':'#1D9E75','体験商品中心':'#BA7517','マーケットプレイス型':'#534AB7','パッケージツアー':'#185FA5','総合手配':'#D85A30','ガイドのみ':'#888780','複数日カスタムツアー':'#3B6D11','法人/旅行会社向け手配':'#E24B4A','その他':'#9c9a92'};
const NC_COL={'B2B受託型':'#1D9E75','ハイブリッド型':'#BA7517','マーケットプレイス型':'#534AB7','OTA依存型':'#185FA5','B2C直販型':'#D85A30','総合旅行手配型':'#888780'};

// ── DEFAULT DATA ────────────────────────────────────────────
const DEFAULT={
axes:[
  {id:'A',name:'供給安定性',color:'#1D9E75',desc:'継続的に案件を受けられる公開上の供給キャパ。A1対応エリア数（40）＋A2対応言語数（20）＋A3公開商品数（40）',lo:'0〜30：1〜3エリア・1〜2言語・商品5以下',mid:'31〜65：4〜6エリア・2〜4言語・商品6〜50',hi:'66〜100：7エリア以上・5言語以上・商品51以上',basis:'A1 エリア数（40点）: 1エリア=10, 2〜3=20, 4〜6=30, 7以上=40\nA2 言語数（20点）: 1言語=5, 2=10, 3〜4=15, 5以上=20\nA3 商品数（40点）: 1〜5=10, 6〜20=20, 21〜50=30, 51以上=40\n情報源: 公式サイト・OTA商品一覧'},
  {id:'B',name:'品質再現性',color:'#534AB7',desc:'誰が提供しても一定品質が出る構造が公開情報から見えるか。平均評価（40）＋低評価率（40）＋品質担保文言（20）',lo:'0〜30：品質管理なし。個人依存。評価4.0未満',mid:'31〜65：採用基準あり・平均評価4.3以上・低評価率5〜15%',hi:'66〜100：評価4.8以上・低評価率3%未満・採用研修保証サポート4項目完備',basis:'B1 平均評価（40点）: 4.8以上=40, 4.6〜4.79=30, 4.3〜4.59=20, 4.0〜4.29=10, 未満=0\nB2 低評価率（40点）: 3%未満=40, 3〜5%=30, 5〜10%=20, 10〜15%=10, 15%以上=0\nB3 品質担保文言（20点）: 各5点×4項目（審査・研修・品質保証・サポート）\n情報源: Google/TripAdvisor/OTAレビュー・公式サイト・FAQ'},

// ── STATE ───────────────────────────────────────────────────
let S;
function loadS(){
  try{const r=localStorage.getItem('sj-v2');S=r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT));}
  catch(e){S=JSON.parse(JSON.stringify(DEFAULT));}
  if(!S.expandedIds)S.expandedIds=[901,904,101,102,103];
}
function saveS(){
  try{localStorage.setItem('sj-v2',JSON.stringify(S));const b=document.getElementById('saved');b.style.display='inline';setTimeout(()=>b.style.display='none',2000);}
  catch(e){}
}

// ── NAV ─────────────────────────────────────────────────────
let cv='map';
function go(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn')[['map','scores','axes','market','summary'].indexOf(v)].classList.add('active');
  cv=v;
  if(v==='map')setTimeout(renderMap,50);
  if(v==='scores')renderScores();
  if(v==='axes')renderAxes();
  if(v==='market')renderMkt();
  if(v==='summary')renderSummary();
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ── MAP ─────────────────────────────────────────────────────
let xId='O',yId='C',fM='すべて',fN='すべて',fCat='すべて';

function buildMapSel(){
  const bld=(id,cur)=>{const el=document.getElementById(id);el.innerHTML=S.axes.map(a=>`<option value="${a.id}">${a.id} ${a.name}</option>`).join('');el.value=cur;};
  bld('xAx',xId);bld('yAx',yId);
  document.getElementById('xAx').onchange=e=>{xId=e.target.value;renderMap();};
  document.getElementById('yAx').onchange=e=>{yId=e.target.value;renderMap();};
  // M filter
  const mVals=['すべて',...new Set(S.comps.map(c=>c.M||'').filter(Boolean))];
  document.getElementById('fM').innerHTML=mVals.map(v=>`<option>${v}</option>`).join('');
  document.getElementById('fM').value=fM;
  document.getElementById('fM').onchange=e=>{fM=e.target.value;renderMap();};
  // N filter
  const nVals=['すべて',...new Set(S.comps.map(c=>c.N||'').filter(Boolean))];
  document.getElementById('fN').innerHTML=nVals.map(v=>`<option>${v}</option>`).join('');
  document.getElementById('fN').value=fN;
  document.getElementById('fN').onchange=e=>{fN=e.target.value;renderMap();};
  // cat filter
  const cVals=['すべて',...Object.keys(CC)];
  document.getElementById('fCat').innerHTML=cVals.map(v=>`<option>${v}</option>`).join('');
  document.getElementById('fCat').value=fCat;
  document.getElementById('fCat').onchange=e=>{fCat=e.target.value;renderMap();};
}

function renderMap(){
  const wrap=document.getElementById('mwrap');
  const canvas=document.getElementById('mc');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  if(!W||!H)return;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);
  const PAD={l:50,r:16,t:20,b:46};
  const pw=W-PAD.l-PAD.r,ph=H-PAD.t-PAD.b;
  const xA=S.axes.find(a=>a.id===xId)||S.axes[0];
  const yA=S.axes.find(a=>a.id===yId)||S.axes[0];
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
  const ac=isDark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.18)';
  const tc=isDark?'rgba(255,255,255,0.36)':'rgba(0,0,0,0.32)';
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle=gc;ctx.lineWidth=0.5;
  [25,50,75].forEach(v=>{
    const gx=PAD.l+pw*v/100,gy=PAD.t+ph*(1-v/100);
    ctx.beginPath();ctx.moveTo(gx,PAD.t);ctx.lineTo(gx,PAD.t+ph);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD.l,gy);ctx.lineTo(PAD.l+pw,gy);ctx.stroke();
  });
  ctx.strokeStyle=ac;ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+ph);ctx.stroke();
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t+ph);ctx.lineTo(PAD.l+pw,PAD.t+ph);ctx.stroke();
  ctx.fillStyle=tc;ctx.font='11px sans-serif';
  ctx.textAlign='center';ctx.fillText(xA.name,PAD.l+pw/2,PAD.t+ph+32);
  ctx.textAlign='left';ctx.fillText('低',PAD.l,PAD.t+ph+14);ctx.fillText('高',PAD.l+pw-10,PAD.t+ph+14);
  ctx.save();ctx.translate(15,PAD.t+ph/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';ctx.fillText(yA.name,0,0);ctx.restore();
  ctx.textAlign='start';ctx.fillText('高',2,PAD.t+6);ctx.fillText('低',2,PAD.t+ph);
  const filtered=S.comps.filter(c=>{
    if(fM!=='すべて'&&c.M!==fM)return false;
    if(fN!=='すべて'&&c.N!==fN)return false;
    if(fCat!=='すべて'&&c.cat!==fCat)return false;
    return true;
  });
  filtered.forEach(c=>{
    const xv=c[xId]||50,yv=c[yId]||50;
    const x=PAD.l+pw*xv/100,y=PAD.t+ph*(1-yv/100);
    const color=CC[c.cat]||'#888';
    const r=c.cat==='自社'?10:7;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=color+(c.cat==='自社'?'ff':'cc');ctx.fill();
    if(c.cat==='自社'){ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();}
    ctx.fillStyle=isDark?'rgba(255,255,255,0.9)':'rgba(0,0,0,0.8)';
    ctx.font=c.cat==='自社'?'700 11px sans-serif':'11px sans-serif';
    ctx.textAlign='left';ctx.fillText(c.name,x+r+4,y+4);
  });
  // legend — show filter state
  let legItems=[];
  if(fM==='すべて'&&fN==='すべて'){
    legItems=Object.entries(CC).map(([cat,col])=>{
      const n=S.comps.filter(c=>c.cat===cat).length;
      return n?`<div class="li"><div class="ld" style="background:${col}"></div>${cat}（${n}）</div>`:'';
    });
  } else {
    if(fM!=='すべて'){const col=MC_COL[fM]||'#888';legItems.push(`<div class="li"><div class="ld" style="background:${col}"></div>M: ${fM}（${filtered.length}社）</div>`);}
    if(fN!=='すべて'){const col=NC_COL[fN]||'#888';legItems.push(`<div class="li"><div class="ld" style="background:${col}"></div>N: ${fN}（${filtered.length}社）</div>`);}
  }
  document.getElementById('legend').innerHTML=legItems.join('');
  canvas.onclick=e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    let hit=null;
    filtered.forEach(c=>{
      const x=PAD.l+pw*(c[xId]||50)/100,y=PAD.t+ph*(1-(c[yId]||50)/100);
      if(Math.sqrt((mx-x)**2+(my-y)**2)<14)hit=c;
    });
    if(hit)openCompModal(hit);
  };
}

function resetMap(){xId='O';yId='C';fM='すべて';fN='すべて';fCat='すべて';buildMapSel();renderMap();}

// ── COMP MODAL ───────────────────────────────────────────────
let editCId=null;
function openCompModal(c=null){
  editCId=c?c.id:null;
  document.getElementById('cm-title').textContent=c?c.name+' を編集':'競合を追加';
  document.getElementById('cm-name').value=c?c.name:'';
  document.getElementById('cm-cat').value=c?c.cat:'ガイド会社';
  document.getElementById('cm-M').value=c?c.M||'半日〜1日プライベートツアー':'半日〜1日プライベートツアー';
  document.getElementById('cm-N').value=c?c.N||'B2B受託型':'B2B受託型';
  document.getElementById('cm-memo').value=c?c.memo||'':'';
  document.getElementById('cm-src').value=c?c.src||'':'';
  document.getElementById('cm-del').style.display=c?'inline-block':'none';
  const sl=document.getElementById('cm-sliders');
  sl.innerHTML=S.axes.map(a=>{const v=c?c[a.id]||0:50;return `<div class="f"><label>${a.id} ${a.name}</label><input type="range" min="0" max="100" value="${v}" oninput="document.getElementById('sv-${a.id}').textContent=this.value" id="sl-${a.id}"><span class="sv" id="sv-${a.id}">${v}</span></div>`;}).join('');
  document.getElementById('cm-modal').classList.add('open');
}
function closeCompModal(){document.getElementById('cm-modal').classList.remove('open');editCId=null;}
function saveComp(){
  const name=document.getElementById('cm-name').value.trim();
  if(!name)return toast('名前を入力してください');
  const entry={id:editCId||S.nextCompId++,name,cat:document.getElementById('cm-cat').value,M:document.getElementById('cm-M').value,N:document.getElementById('cm-N').value,memo:document.getElementById('cm-memo').value,src:document.getElementById('cm-src').value};
  S.axes.forEach(a=>{const el=document.getElementById('sl-'+a.id);if(el)entry[a.id]=parseInt(el.value);});
  if(editCId){const i=S.comps.findIndex(c=>c.id===editCId);if(i>=0)S.comps[i]=entry;}
  else S.comps.push(entry);
  saveS();closeCompModal();buildMapSel();renderMap();if(cv==='scores')renderScores();if(cv==='summary')renderSummary();toast('保存しました');
}
function delComp(){if(!editCId)return;S.comps=S.comps.filter(c=>c.id!==editCId);saveS();closeCompModal();buildMapSel();renderMap();renderScores();renderSummary();toast('削除しました');}

// ── SCORES ───────────────────────────────────────────────────
function tot(c){const v=S.axes.map(a=>c[a.id]||0);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0;}
function renderScores(){
  const catF=document.getElementById('sc-cat').value;
  const sortF=document.getElementById('sc-sort').value;
  let list=[...S.comps].filter(c=>catF==='すべて'||c.cat===catF);
  if(sortF==='total')list.sort((a,b)=>tot(b)-tot(a));
  else if(sortF==='O')list.sort((a,b)=>(b.O||0)-(a.O||0));
  else list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  document.getElementById('sc-list').innerHTML=list.map(c=>{
    const t=tot(c),color=CC[c.cat]||'#888';
    const mc=MC_COL[c.M]||'#888';const nc=NC_COL[c.N]||'#888';
    return `<div class="sc-item${c.cat==='自社'?' self':''}">
      <div class="sc-hd" onclick="toggleSc(${c.id})">
        <span class="sc-nm">${c.name}</span>
        <span class="tag" style="color:${color};border-color:${color}">${c.cat}</span>
        <span class="sc-tot" style="color:${color}">${t}pt</span>
        <span style="font-size:10px;color:var(--text3);margin-left:3px">▼</span>
      </div>
      <div class="sc-bd" id="scb-${c.id}">
        <div class="tag-row">
          <span class="tag" style="color:${mc};border-color:${mc}">M: ${c.M||'未設定'}</span>
          <span class="tag" style="color:${nc};border-color:${nc}">N: ${c.N||'未設定'}</span>
        </div>
        ${S.axes.map(a=>`<div class="bar-r"><span class="bar-l">${a.id} ${a.name}</span><div class="bar-t"><div class="bar-f" style="width:${c[a.id]||0}%;background:${color}"></div></div><span class="bar-v" style="color:${color}">${c[a.id]||0}</span></div>`).join('')}
        ${c.memo?`<div class="memo">${c.memo}</div>`:''}
        ${c.src?`<div class="src">出典：${c.src}</div>`:''}
        <div class="br" style="margin-top:8px"><button onclick="openCompModal(S.comps.find(x=>x.id==${c.id}))">編集</button></div>
      </div>
    </div>`;
  }).join('');
}
function toggleSc(id){const el=document.getElementById('scb-'+id);if(!el)return;const o=el.classList.contains('open');document.querySelectorAll('.sc-bd').forEach(b=>b.classList.remove('open'));if(!o)el.classList.add('open');}

// ── AXES ─────────────────────────────────────────────────────
let editAId=null;
function renderAxes(){
  document.getElementById('ax-list').innerHTML=S.axes.map(a=>`
    <div class="ax-card">
      <div class="ax-hd">
        <span class="ax-id" style="border:1px solid ${a.color};color:${a.color}">${a.id}</span>
        <span class="ax-nm">${a.name}</span>
        <button style="margin-left:auto" onclick="openAxisModal('${a.id}')">編集</button>
      </div>
      <div class="ax-ds">${a.desc}</div>
      <div class="bands">
        <div class="band blo"><div class="bl">低（0〜30）</div>${a.lo}</div>
        <div class="band bmi"><div class="bl">中（31〜65）</div>${a.mid}</div>
        <div class="band bhi"><div class="bl">高（66〜100）</div>${a.hi}</div>
      </div>
      <div class="ax-bs">${a.basis}</div>
    </div>`).join('');
}
function openAxisModal(id=null){
  editAId=id;const a=id?S.axes.find(x=>x.id===id):null;
  document.getElementById('am-title').textContent=a?a.name+' を編集':'軸を追加';
  document.getElementById('am-id').value=a?a.id:'';document.getElementById('am-name').value=a?a.name:'';document.getElementById('am-desc').value=a?a.desc:'';document.getElementById('am-lo').value=a?a.lo:'';document.getElementById('am-mid').value=a?a.mid:'';document.getElementById('am-hi').value=a?a.hi:'';document.getElementById('am-basis').value=a?a.basis:'';
  document.getElementById('am-del').style.display=a?'inline-block':'none';
  document.getElementById('am-modal').classList.add('open');
}
function closeAxisModal(){document.getElementById('am-modal').classList.remove('open');editAId=null;}
function saveAxis(){
  const id=document.getElementById('am-id').value.trim().toUpperCase();
  const name=document.getElementById('am-name').value.trim();
  if(!id||!name)return toast('IDと名前を入力してください');
  const entry={id,name,color:'#888780',desc:document.getElementById('am-desc').value,lo:document.getElementById('am-lo').value,mid:document.getElementById('am-mid').value,hi:document.getElementById('am-hi').value,basis:document.getElementById('am-basis').value};
  if(editAId){const i=S.axes.findIndex(a=>a.id===editAId);if(i>=0)S.axes[i]=entry;}
  else S.axes.push(entry);
  saveS();closeAxisModal();renderAxes();buildMapSel();toast('保存しました');
}
function delAxis(){if(!editAId)return;S.axes=S.axes.filter(a=>a.id!==editAId);saveS();closeAxisModal();renderAxes();buildMapSel();toast('削除しました');}

// ── MARKET ───────────────────────────────────────────────────
let editMId=null;
function mktAll(exp){if(exp)S.mkts.forEach(m=>{if(!S.expandedIds.includes(m.id))S.expandedIds.push(m.id);});else S.expandedIds=[];saveS();renderMkt();}
function fmt(v){if(!v||v===0)return '要調査';if(v>=10000)return (v/10000).toFixed(1)+'兆円';return v.toLocaleString()+'億円';}
function renderMkt(){
  const maxV=Math.max(...S.mkts.map(m=>m.val||0),1);
  const roots=S.mkts.filter(m=>!m.parentId&&m.parentId!==0);
  const el=document.getElementById('mk-list');el.innerHTML='';
  roots.forEach(r=>el.appendChild(buildMktNode(r,maxV,0)));
  buildMktParent();
}
function buildMktNode(node,maxV,depth){
  const children=S.mkts.filter(m=>String(m.parentId)===String(node.id));
  const isExp=S.expandedIds.includes(node.id);
  const color=TC[node.type]||'#888';
  const pct=node.val&&maxV>0?Math.round(node.val/maxV*100):0;
  const el=document.createElement('div');el.className='mk-node';el.style.marginLeft=(depth*12)+'px';
  const hd=document.createElement('div');hd.className='mk-hd';
  hd.innerHTML=`<span style="font-size:11px;color:var(--text3);width:12px;flex-shrink:0;cursor:pointer" onclick="toggleMkt(${node.id})">${children.length?(isExp?'▼':'▶'):' '}</span>
    <span class="mk-nm" style="font-size:${Math.max(11,13-depth)}px">${node.name}</span>
    <div class="mk-bw"><div class="mk-b" style="width:${pct}%;background:${color}"></div></div>
    <span class="mk-v" style="color:${color};font-size:${Math.max(11,13-depth)}px">${fmt(node.val)}</span>
    <span class="tag" style="color:${color};border-color:${color}">${TL[node.type]||''}</span>
    <span class="tag" style="color:${SC[node.status]};border-color:${SC[node.status]}">${SL[node.status]||''}</span>
    ${node.sj==='current'?'<span class="tag" style="color:var(--red);border-color:var(--red)">主戦場</span>':''}
    ${node.sj==='target'?'<span class="tag" style="color:var(--teal);border-color:var(--teal)">狙い目</span>':''}
    <button style="font-size:10px;height:22px;margin-left:4px;flex-shrink:0" onclick="openMktModal(${node.id})">編集</button>`;
  el.appendChild(hd);
  if(node.memo){const m=document.createElement('div');m.className='mk-mm';m.textContent=node.memo;el.appendChild(m);}
  if(children.length&&isExp){const cw=document.createElement('div');cw.className='mk-ch';children.forEach(c=>cw.appendChild(buildMktNode(c,maxV,depth+1)));el.appendChild(cw);}
  return el;
}
function toggleMkt(id){const i=S.expandedIds.indexOf(id);if(i>=0)S.expandedIds.splice(i,1);else S.expandedIds.push(id);saveS();renderMkt();}
function buildMktParent(){const sel=document.getElementById('mm-parent');if(!sel)return;sel.innerHTML='<option value="">なし（トップ）</option>'+S.mkts.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');}
function openMktModal(id=null){
  editMId=id;const m=id?S.mkts.find(x=>x.id==id):null;
  document.getElementById('mm-title').textContent=m?m.name+' を編集':'市場を追加';
  document.getElementById('mm-name').value=m?m.name:'';document.getElementById('mm-val').value=m?m.val||0:0;document.getElementById('mm-type').value=m?m.type||'sub':'sub';document.getElementById('mm-status').value=m?m.status||'estimated':'estimated';document.getElementById('mm-sj').value=m?m.sj||'':'';document.getElementById('mm-memo').value=m?m.memo||'':'';
  document.getElementById('mm-del').style.display=m?'inline-block':'none';
  document.getElementById('mm-modal').classList.add('open');buildMktParent();
  if(m)document.getElementById('mm-parent').value=m.parentId||'';
}
function closeMktModal(){document.getElementById('mm-modal').classList.remove('open');editMId=null;}
function saveMkt(){
  const name=document.getElementById('mm-name').value.trim();if(!name)return toast('名前を入力してください');
  const pr=document.getElementById('mm-parent').value;
  const entry={id:editMId||S.nextMktId++,name,val:parseFloat(document.getElementById('mm-val').value)||0,type:document.getElementById('mm-type').value,parentId:pr?parseInt(pr):'',status:document.getElementById('mm-status').value,sj:document.getElementById('mm-sj').value,memo:document.getElementById('mm-memo').value};
  if(editMId){const i=S.mkts.findIndex(m=>m.id===editMId);if(i>=0)S.mkts[i]=entry;}
  else{S.mkts.push(entry);if(entry.parentId&&!S.expandedIds.includes(entry.parentId))S.expandedIds.push(entry.parentId);}
  saveS();closeMktModal();renderMkt();toast('保存しました');
}
function delMkt(){if(!editMId)return;S.mkts=S.mkts.filter(m=>m.id!==editMId&&String(m.parentId)!==String(editMId));saveS();closeMktModal();renderMkt();toast('削除しました');}

// ── SUMMARY ──────────────────────────────────────────────────
function renderSummary(){
  const sorted=[...S.comps].sort((a,b)=>(b.O||0)-(a.O||0));
  const ids=S.axes.map(a=>a.id),names=S.axes.map(a=>a.name);
  const sj=S.comps.find(c=>c.cat==='自社');
  document.getElementById('sum-tbl').innerHTML=`<table class="st">
    <tr><th>競合</th><th>M カテゴリ</th><th>N モデル</th>${ids.map((id,i)=>`<th title="${names[i]}">${id}</th>`).join('')}<th>平均</th></tr>
    ${sorted.map(c=>{const color=CC[c.cat]||'#888';const mc=MC_COL[c.M]||'#888';const nc=NC_COL[c.N]||'#888';return `<tr class="${c.cat==='自社'?'s-row':''}">
      <td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${color};margin-right:4px;vertical-align:middle"></span>${c.name.length>12?c.name.slice(0,12)+'…':c.name}</td>
      <td><span style="font-size:10px;color:${mc}">${c.M||'-'}</span></td>
      <td><span style="font-size:10px;color:${nc}">${c.N||'-'}</span></td>
      ${ids.map(id=>`<td><div class="cbc"><div class="mb" style="width:${Math.round((c[id]||0)/2)}px;background:${color}"></div><span style="font-size:10px;font-weight:600;color:${(c[id]||0)>=70?color:'var(--text3)'}">${c[id]||0}</span></div></td>`).join('')}
      <td style="font-weight:700;color:${color}">${tot(c)}</td></tr>`;}).join('')}
  </table>`;
  if(sj){
    const gaps=ids.map((id,i)=>({name:names[i],gap:Math.max(...S.comps.filter(c=>c.cat!=='自社').map(c=>c[id]||0))-(sj[id]||0),sj:sj[id]||0,max:Math.max(...S.comps.filter(c=>c.cat!=='自社').map(c=>c[id]||0))})).sort((a,b)=>b.gap-a.gap);
    const strengths=ids.map((id,i)=>({name:names[i],val:sj[id]||0})).filter(x=>x.val>=70).sort((a,b)=>b.val-a.val);
    document.getElementById('sum-ins').innerHTML=`<strong>See Jay 競合比較インサイト（新基準）</strong><br>
      O 主力商品一致度：<strong>100点</strong>（「英語プライベートツアーの現場運営・ガイド手配」と完全一致する競合は限定的）<br>
      強み：${strengths.length?strengths.map(s=>`${s.name}（${s.val}点）`).join('・'):'現時点で70点超の軸なし'}<br>
      最大ギャップ：${gaps[0].name}（自社${gaps[0].sj}点 vs 競合最高${gaps[0].max}点 / 差${gaps[0].gap}点）<br>
      次ギャップ：${gaps[1].name}（自社${gaps[1].sj}点 vs 競合最高${gaps[1].max}点 / 差${gaps[1].gap}点）<br>
      <strong>空白ポジション：</strong>「C B2B対応力80 × D オペ柔軟性80 × O主力商品一致度100」の組み合わせはSee Jayのみ。手配業取得後はAも大幅改善予定。`;
  }
}

// ── MODAL CLOSE ──────────────────────────────────────────────
['cm-modal','am-modal','mm-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

window.addEventListener('resize',()=>{if(cv==='map')renderMap();});

// ── INIT ─────────────────────────────────────────────────────
loadS();buildMapSel();renderMap();
</script>
