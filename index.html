<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>See Jay — Market Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f7f4;--bg3:#f1efe8;
  --text:#1a1a18;--text2:#5c5c58;--text3:#9c9a92;
  --border:#e8e6de;--border2:#d3d1c7;
  --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-d:#085041;
  --coral:#D85A30;--coral-l:#FAECE7;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --green:#3B6D11;--green-l:#EAF3DE;
  --gray:#5F5E5A;--gray-l:#F1EFE8;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --red:#E24B4A;--red-l:#FCEBEB;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 4px rgba(0,0,0,0.08);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
    --text:#e8e6de;--text2:#b4b2a9;--text3:#6c6a62;
    --border:#3a3a36;--border2:#4a4a46;
    --purple-l:#26215C;--teal-l:#04342C;--coral-l:#4A1B0C;
    --amber-l:#412402;--green-l:#173404;--gray-l:#2C2C2A;--blue-l:#042C53;--red-l:#501313;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
/* HEADER */
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:100}
.logo{font-weight:700;font-size:16px;color:var(--purple);letter-spacing:-0.3px}
.logo span{color:var(--text2);font-weight:400}
.nav{display:flex;gap:2px;margin-left:auto}
.nav-btn{padding:6px 12px;border-radius:var(--radius);border:none;background:none;color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--purple-l);color:var(--purple);font-weight:500}
.save-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--teal-l);color:var(--teal);display:none}
/* LAYOUT */
.view{display:none;padding:20px;max-width:1200px;margin:0 auto}
.view.active{display:block}
/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow)}
.card-title{font-weight:600;font-size:14px;margin-bottom:12px;color:var(--text)}
/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:var(--purple-d)}
.btn-danger{color:var(--red);border-color:var(--red)}
.btn-sm{padding:4px 10px;font-size:12px}
/* FORM */
.field{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.field label{font-size:12px;color:var(--text2);width:96px;flex-shrink:0}
.field input,.field select,.field textarea{flex:1;min-width:120px;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px}
.field input[type=range]{padding:0}
.field textarea{min-height:60px;resize:vertical}
.slider-val{font-size:12px;min-width:26px;text-align:right;color:var(--text2)}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-top:12px;display:none}
.panel.open{display:block}
.panel h3{font-size:14px;font-weight:600;margin-bottom:12px}
.btn-row{display:flex;gap:8px;margin-top:12px}
/* TAGS */
.tag{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block;white-space:nowrap}
/* MAP */
#map-wrap{position:relative;width:100%;padding-bottom:60%;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);overflow:hidden;margin-bottom:10px}
#map-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}
.map-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.map-controls label{font-size:12px;color:var(--text2)}
.map-controls select{padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:12px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
/* SCORES */
.sc-list{display:flex;flex-direction:column;gap:6px}
.sc-item{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.sc-item.is-self{border-color:var(--red);border-width:2px}
.sc-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--bg2);transition:background .1s}
.sc-head:hover{background:var(--bg3)}
.sc-name{font-weight:600;flex:1;font-size:14px}
.sc-total{font-size:13px;font-weight:600;min-width:38px;text-align:right}
.sc-body{padding:12px 14px;display:none;border-top:1px solid var(--border)}
.sc-body.open{display:block}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bar-label{font-size:11px;color:var(--text2);width:96px;flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-val{font-size:11px;font-weight:600;min-width:24px;text-align:right}
.sc-memo{font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5}
.sc-src{font-size:11px;color:var(--text3);margin-top:4px}
/* AXES */
.ax-list{display:flex;flex-direction:column;gap:8px}
.ax-card{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.ax-head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2)}
.ax-id{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.ax-name{font-weight:600;font-size:14px;flex:1}
.ax-desc{font-size:12px;color:var(--text2);padding:8px 14px;line-height:1.5}
.bands{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px 14px 12px}
.band{padding:6px 10px;border-radius:var(--radius);font-size:12px;line-height:1.5}
.band-lo{background:var(--gray-l);color:var(--gray)}
.band-mid{background:var(--amber-l);color:var(--amber)}
.band-hi{background:var(--teal-l);color:var(--teal-d)}
.band-label{font-weight:600;font-size:11px;margin-bottom:2px}
.ax-basis{font-size:11px;color:var(--text3);padding:0 14px 10px;white-space:pre-line;line-height:1.5}
/* MARKET */
.mkt-list{display:flex;flex-direction:column;gap:6px}
.mkt-node{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.mkt-head{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;transition:background .1s}
.mkt-head:hover{background:var(--bg2)}
.mkt-toggle{font-size:11px;color:var(--text3);width:14px;flex-shrink:0}
.mkt-name{font-weight:500;min-width:150px;flex:1}
.mkt-bar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:40px;max-width:200px}
.mkt-bar{height:100%;border-radius:3px}
.mkt-val{font-size:13px;font-weight:600;min-width:100px;text-align:right;white-space:nowrap}
.mkt-tags{display:flex;gap:4px;flex-shrink:0}
.mkt-memo{font-size:11px;color:var(--text3);padding:0 14px 8px;line-height:1.4}
.mkt-children{padding-left:16px}
/* SUMMARY */
.summary-table{overflow-x:auto;margin-bottom:16px}
table.sum{border-collapse:collapse;width:100%;min-width:600px;font-size:12px}
table.sum th{padding:8px 10px;text-align:center;background:var(--bg2);border-bottom:2px solid var(--border);font-weight:600;white-space:nowrap}
table.sum th:first-child{text-align:left}
table.sum td{padding:6px 10px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
table.sum td:first-child{text-align:left;font-weight:500;white-space:nowrap}
table.sum tr.self-row td{background:var(--red-l)}
table.sum tr:hover td{background:var(--bg2)}
.mini-bar-cell{display:flex;align-items:center;gap:4px;justify-content:center}
.mini-bar{height:5px;border-radius:3px;min-width:2px}
.insight-box{background:var(--purple-l);border:1px solid var(--purple);border-radius:var(--radius-lg);padding:14px 16px;font-size:13px;color:var(--purple-d);line-height:1.7}
/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}.bands{grid-template-columns:1fr}}
/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--bg2);border-radius:var(--radius-lg);padding:14px 16px;border:1px solid var(--border)}
.kpi-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;color:var(--text)}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:2px}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;display:none}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:20px;width:90%;max-width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--teal);color:#fff;padding:10px 18px;border-radius:var(--radius-lg);font-size:13px;font-weight:500;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<header class="header">
  <div class="logo">See Jay <span>Market Intelligence</span></div>
  <span class="save-badge" id="save-badge">保存済み ✓</span>
  <nav class="nav">
    <button class="nav-btn active" onclick="goTo('map')">マップ</button>
    <button class="nav-btn" onclick="goTo('scores')">競合スコア</button>
    <button class="nav-btn" onclick="goTo('axes')">軸の定義</button>
    <button class="nav-btn" onclick="goTo('market')">市場規模</button>
    <button class="nav-btn" onclick="goTo('summary')">サマリー</button>
  </nav>
</header>

<!-- MAP -->
<div id="view-map" class="view active">
  <div class="map-controls">
    <label>横軸</label><select id="xAx"></select>
    <label style="margin-left:8px">縦軸</label><select id="yAx"></select>
    <label style="margin-left:8px">絞り込み</label><select id="catF"></select>
    <button class="btn btn-primary btn-sm" onclick="openCompModal()">＋ 競合追加</button>
    <button class="btn btn-sm" onclick="resetMap()">リセット</button>
  </div>
  <div id="map-wrap"><canvas id="map-canvas"></canvas></div>
  <div class="legend" id="legend"></div>
</div>

<!-- SCORES -->
<div id="view-scores" class="view">
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
    <select id="sc-cat" onchange="renderScores()" style="padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px">
      <option>すべて</option><option>ガイド会社</option><option>OTA/プラットフォーム</option>
      <option>総合旅行会社・DMC</option><option>フリーランスガイド</option><option>自社</option>
    </select>
    <select id="sc-sort" onchange="renderScores()" style="padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px">
      <option value="total">総合スコア順</option><option value="name">名前順</option>
    </select>
    <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openCompModal()">＋ 競合追加</button>
  </div>
  <div class="sc-list" id="sc-list"></div>
</div>

<!-- AXES -->
<div id="view-axes" class="view">
  <div style="margin-bottom:12px">
    <button class="btn btn-primary btn-sm" onclick="openAxisModal()">＋ 軸を追加</button>
  </div>
  <div class="ax-list" id="ax-list"></div>
</div>

<!-- MARKET -->
<div id="view-market" class="view">
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn btn-primary btn-sm" onclick="openMktModal()">＋ 市場を追加</button>
    <button class="btn btn-sm" onclick="mktExpandAll(true)">すべて展開</button>
    <button class="btn btn-sm" onclick="mktExpandAll(false)">折りたたむ</button>
  </div>
  <div class="mkt-list" id="mkt-list"></div>
</div>

<!-- SUMMARY -->
<div id="view-summary" class="view">
  <div class="summary-table" id="sum-table"></div>
  <div class="insight-box" id="sum-insight"></div>
</div>

<!-- COMP MODAL -->
<div class="modal-bg" id="comp-modal">
  <div class="modal">
    <h2 id="comp-modal-title">競合を追加</h2>
    <div class="field"><label>名前</label><input id="cm-name" type="text" placeholder="会社名"></div>
    <div class="field"><label>カテゴリ</label>
      <select id="cm-cat"><option>ガイド会社</option><option>OTA/プラットフォーム</option>
      <option>総合旅行会社・DMC</option><option>フリーランスガイド</option><option>手配業者</option><option>自社</option></select>
    </div>
    <div id="cm-sliders"></div>
    <div class="field"><label>メモ</label><input id="cm-memo" type="text" placeholder="特徴・根拠など"></div>
    <div class="field"><label>出典</label><input id="cm-src" type="text" placeholder="URL・資料名"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveComp()">保存</button>
      <button class="btn" onclick="closeCompModal()">キャンセル</button>
      <button class="btn btn-danger" id="cm-del" style="display:none;margin-left:auto" onclick="delComp()">削除</button>
    </div>
  </div>
</div>

<!-- AXIS MODAL -->
<div class="modal-bg" id="axis-modal">
  <div class="modal">
    <h2 id="axis-modal-title">軸を追加</h2>
    <div class="field"><label>ID（英大文字）</label><input id="am-id" type="text" maxlength="2" style="width:60px;flex:none"></div>
    <div class="field"><label>軸名</label><input id="am-name" type="text"></div>
    <div class="field"><label>説明</label><input id="am-desc" type="text"></div>
    <div class="field"><label>低（0〜30）</label><input id="am-lo" type="text"></div>
    <div class="field"><label>中（31〜65）</label><input id="am-mid" type="text"></div>
    <div class="field"><label>高（66〜100）</label><input id="am-hi" type="text"></div>
    <div class="field"><label>判断指標</label><textarea id="am-basis"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveAxis()">保存</button>
      <button class="btn" onclick="closeAxisModal()">キャンセル</button>
      <button class="btn btn-danger" id="am-del" style="display:none;margin-left:auto" onclick="delAxis()">削除</button>
    </div>
  </div>
</div>

<!-- MARKET MODAL -->
<div class="modal-bg" id="mkt-modal">
  <div class="modal">
    <h2 id="mkt-modal-title">市場を追加</h2>
    <div class="field"><label>市場名</label><input id="mm-name" type="text"></div>
    <div class="field"><label>規模（億円）</label><input id="mm-val" type="number" placeholder="0=要調査"></div>
    <div class="field"><label>種別</label>
      <select id="mm-type"><option value="TAM">TAM</option><option value="SAM">SAM</option>
      <option value="SOM">実戦用市場</option><option value="sub">サブ市場</option></select>
    </div>
    <div class="field"><label>親市場</label><select id="mm-parent"><option value="">なし（トップレベル）</option></select></div>
    <div class="field"><label>ステータス</label>
      <select id="mm-status"><option value="confirmed">確定値</option><option value="estimated">推計値</option><option value="todo">要調査</option></select>
    </div>
    <div class="field"><label>See Jay関連</label>
      <select id="mm-sj"><option value="">-</option><option value="current">現在の主戦場</option><option value="target">狙える市場</option></select>
    </div>
    <div class="field"><label>メモ・出典</label><input id="mm-memo" type="text"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveMkt()">保存</button>
      <button class="btn" onclick="closeMktModal()">キャンセル</button>
      <button class="btn btn-danger" id="mm-del" style="display:none;margin-left:auto" onclick="delMkt()">削除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ────────────────────────────────────────────────────
const CAT_COLORS={
  'ガイド会社':'#1D9E75','OTA/プラットフォーム':'#BA7517','総合旅行会社・DMC':'#534AB7',
  'フリーランスガイド':'#888780','手配業者':'#185FA5','自社':'#E24B4A'
};
const TYPE_COLORS={TAM:'#534AB7',SAM:'#1D9E75',SOM:'#D85A30',sub:'#888780'};
const TYPE_LBL={TAM:'TAM',SAM:'SAM',SOM:'実戦',sub:'サブ'};
const STATUS_LBL={confirmed:'確定',estimated:'推計',todo:'要調査'};
const STATUS_COL={confirmed:'#1D9E75',estimated:'#BA7517',todo:'#888780'};

const DEFAULT = {
  axes:[
    {id:'A',name:'供給規模',color:'#1D9E75',desc:'日本国内で安定的に動かせるガイド数・催行件数。欠員時の代替供給力も含む。',lo:'0〜30：ガイド10名未満・月50件未満。代替困難',mid:'31〜65：10〜300名程度・安定供給だが地域制限あり',hi:'66〜100：300名超・全国対応・常時代替可能',basis:'判断指標：公開登録ガイド数・年間催行件数・対応エリア数・代替手配速度'},
    {id:'B',name:'品質担保力',color:'#534AB7',desc:'組織として品質を再現・管理できるか。採用基準・教育・評価・トラブル対応体制の整備度。',lo:'0〜30：品質管理なし。個人依存',mid:'31〜65：一定の採用基準・事後レビュー収集あり',hi:'66〜100：採用・研修・評価・トラブル対応が組織として機能',basis:'判断指標：採用基準の明文化・教育プログラム・レビュー件数と評点・トラブル対応実績'},

// ── MAP ──────────────────────────────────────────────────────
let xAxisId='A',yAxisId='C',filterCat='すべて';

function buildMapSelects(){
  const build=(id,cur)=>{
    const el=document.getElementById(id);
    el.innerHTML=state.axes.map(a=>`<option value="${a.id}">${a.id} ${a.name}</option>`).join('');
    el.value=cur;
  };
  build('xAx',xAxisId);build('yAx',yAxisId);
  document.getElementById('xAx').onchange=e=>{xAxisId=e.target.value;renderMap();};
  document.getElementById('yAx').onchange=e=>{yAxisId=e.target.value;renderMap();};
  const fc=document.getElementById('catF');
  fc.innerHTML=['すべて',...Object.keys(CAT_COLORS)].map(c=>`<option>${c}</option>`).join('');
  fc.value=filterCat;
  fc.onchange=e=>{filterCat=e.target.value;renderMap();};
}

function renderMap(){
  const wrap=document.getElementById('map-wrap');
  const canvas=document.getElementById('map-canvas');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  if(!W||!H)return;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);
  const PAD={l:48,r:16,t:20,b:44};
  const pw=W-PAD.l-PAD.r,ph=H-PAD.t-PAD.b;
  const xA=state.axes.find(a=>a.id===xAxisId)||state.axes[0];
  const yA=state.axes.find(a=>a.id===yAxisId)||state.axes[1];
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
  const ac=isDark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.18)';
  const tc=isDark?'rgba(255,255,255,0.36)':'rgba(0,0,0,0.32)';
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle=gc;ctx.lineWidth=0.5;
  [25,50,75].forEach(v=>{
    const gx=PAD.l+pw*v/100,gy=PAD.t+ph*(1-v/100);
    ctx.beginPath();ctx.moveTo(gx,PAD.t);ctx.lineTo(gx,PAD.t+ph);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD.l,gy);ctx.lineTo(PAD.l+pw,gy);ctx.stroke();
  });
  ctx.strokeStyle=ac;ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+ph);ctx.stroke();
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t+ph);ctx.lineTo(PAD.l+pw,PAD.t+ph);ctx.stroke();
  ctx.fillStyle=tc;ctx.font='11px sans-serif';
  ctx.textAlign='center';ctx.fillText(xA.name,PAD.l+pw/2,PAD.t+ph+30);
  ctx.textAlign='left';ctx.fillText('低',PAD.l,PAD.t+ph+14);ctx.fillText('高',PAD.l+pw-10,PAD.t+ph+14);
  ctx.save();ctx.translate(14,PAD.t+ph/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';ctx.fillText(yA.name,0,0);ctx.restore();
  ctx.textAlign='start';ctx.fillText('高',2,PAD.t+6);ctx.fillText('低',2,PAD.t+ph);
  const filtered=filterCat==='すべて'?state.comps:state.comps.filter(c=>c.cat===filterCat);
  filtered.forEach(c=>{
    const xv=c[xAxisId]||50,yv=c[yAxisId]||50;
    const x=PAD.l+pw*xv/100,y=PAD.t+ph*(1-yv/100);
    const color=CAT_COLORS[c.cat]||'#888';
    const r=c.cat==='自社'?10:7;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=color+(c.cat==='自社'?'ff':'cc');ctx.fill();
    if(c.cat==='自社'){ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();}
    ctx.fillStyle=isDark?'rgba(255,255,255,0.9)':'rgba(0,0,0,0.8)';
    ctx.font=c.cat==='自社'?'700 11px sans-serif':'11px sans-serif';
    ctx.textAlign='left';ctx.fillText(c.name,x+r+4,y+4);
  });
  document.getElementById('legend').innerHTML=Object.entries(CAT_COLORS).map(([cat,col])=>{
    const n=state.comps.filter(c=>c.cat===cat).length;
    return n?`<div class="legend-item"><div class="legend-dot" style="background:${col}"></div>${cat}（${n}）</div>`:'';
  }).join('');
  canvas.onclick=e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    let hit=null;
    filtered.forEach(c=>{
      const x=PAD.l+pw*(c[xAxisId]||50)/100,y=PAD.t+ph*(1-(c[yAxisId]||50)/100);
      if(Math.sqrt((mx-x)**2+(my-y)**2)<14)hit=c;
    });
    if(hit)openCompModal(hit);
  };
}

function resetMap(){xAxisId='A';yAxisId='C';filterCat='すべて';buildMapSelects();renderMap();}

// ── SCORES ────────────────────────────────────────────────────
function tot(c){const v=state.axes.map(a=>c[a.id]||0);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0;}

function renderScores(){
  const catF=document.getElementById('sc-cat').value;
  const sortF=document.getElementById('sc-sort').value;
  let list=[...state.comps].filter(c=>catF==='すべて'||c.cat===catF);
  if(sortF==='total')list.sort((a,b)=>tot(b)-tot(a));
  else list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  document.getElementById('sc-list').innerHTML=list.map(c=>{
    const t=tot(c),color=CAT_COLORS[c.cat]||'#888';
    return `<div class="sc-item${c.cat==='自社'?' is-self':''}">
      <div class="sc-head" onclick="toggleScore(${c.id})">
        <span class="sc-name">${c.name}</span>
        <span class="tag" style="border:1px solid ${color};color:${color}">${c.cat}</span>
        <span class="sc-total" style="color:${color}">${t}点</span>
        <span style="font-size:11px;color:var(--text3);margin-left:4px">▼</span>
      </div>
      <div class="sc-body" id="scb-${c.id}">
        ${state.axes.map(a=>`
          <div class="bar-row">
            <span class="bar-label">${a.id} ${a.name}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${c[a.id]||0}%;background:${color}"></div></div>
            <span class="bar-val" style="color:${color}">${c[a.id]||0}</span>
          </div>`).join('')}
        ${c.memo?`<div class="sc-memo">${c.memo}</div>`:''}
        ${c.src?`<div class="sc-src">出典：${c.src}</div>`:''}
        <div class="btn-row" style="margin-top:10px">
          <button class="btn btn-sm" onclick="openCompModal(state.comps.find(x=>x.id==${c.id}))">編集</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleScore(id){
  const el=document.getElementById('scb-'+id);if(!el)return;
  const open=el.classList.contains('open');
  document.querySelectorAll('.sc-body').forEach(b=>b.classList.remove('open'));
  if(!open)el.classList.add('open');

function mktExpandAll(exp){
  if(exp)state.mkts.forEach(m=>state.expandedIds.push(m.id));
  else state.expandedIds=[];
  state.expandedIds=[...new Set(state.expandedIds)];
  saveState();renderMkt();

function fmt(v){
  if(!v||v===0)return '要調査';
  if(v>=10000)return (v/10000).toFixed(1)+'兆円';
  return v.toLocaleString()+'億円';
}

function renderMkt(){
  const maxV=Math.max(...state.mkts.map(m=>m.val||0),1);
  const roots=state.mkts.filter(m=>!m.parentId&&m.parentId!==0);
  document.getElementById('mkt-list').innerHTML='';
  roots.forEach(r=>document.getElementById('mkt-list').appendChild(buildMktNode(r,maxV,0)));
  buildMktParent();
}

function buildMktNode(node,maxV,depth){
  const children=state.mkts.filter(m=>String(m.parentId)===String(node.id));
  const isExp=state.expandedIds.includes(node.id);
  const color=TYPE_COLORS[node.type]||'#888';
  const pct=node.val&&maxV>0?Math.round(node.val/maxV*100):0;
  const el=document.createElement('div');
  el.className='mkt-node';el.style.marginLeft=(depth*12)+'px';
  const hd=document.createElement('div');hd.className='mkt-head';
  hd.innerHTML=`
    <span class="mkt-toggle" onclick="toggleMkt(${node.id})" style="cursor:pointer">${children.length?(isExp?'▼':'▶'):' '}</span>
    <span class="mkt-name" style="font-size:${Math.max(12,14-depth)}px">${node.name}</span>
    <div class="mkt-bar-wrap"><div class="mkt-bar" style="width:${pct}%;background:${color}"></div></div>
    <span class="mkt-val" style="color:${color};font-size:${Math.max(12,14-depth)}px">${fmt(node.val)}</span>
    <div class="mkt-tags">
      <span class="tag" style="background:${color}22;color:${color}">${TYPE_LBL[node.type]||''}</span>
      <span class="tag" style="background:${STATUS_COL[node.status]}22;color:${STATUS_COL[node.status]}">${STATUS_LBL[node.status]||''}</span>
      ${node.sj==='current'?'<span class="tag" style="background:var(--red-l);color:var(--red)">主戦場</span>':''}
      ${node.sj==='target'?'<span class="tag" style="background:var(--teal-l);color:var(--teal-d)">狙い目</span>':''}
    </div>
    <button class="btn btn-sm" onclick="openMktModal(${node.id})" style="flex-shrink:0">編集</button>`;
  el.appendChild(hd);
  if(node.memo){const m=document.createElement('div');m.className='mkt-memo';m.textContent=node.memo;el.appendChild(m);}
  if(children.length&&isExp){
    const cw=document.createElement('div');cw.className='mkt-children';
    children.forEach(c=>cw.appendChild(buildMktNode(c,maxV,depth+1)));
    el.appendChild(cw);
  }
  return el;
}

function toggleMkt(id){
  const idx=state.expandedIds.indexOf(id);
  if(idx>=0)state.expandedIds.splice(idx,1);else state.expandedIds.push(id);
  saveState();renderMkt();
}

function buildMktParent(){
  const sel=document.getElementById('mm-parent');if(!sel)return;
  sel.innerHTML='<option value="">なし（トップレベル）</option>'+state.mkts.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
}

function openMktModal(id=null){
  editMktId=id;
  const m=id?state.mkts.find(x=>x.id==id):null;
  document.getElementById('mkt-modal-title').textContent=m?m.name+' を編集':'市場を追加';
  document.getElementById('mm-name').value=m?m.name:'';
  document.getElementById('mm-val').value=m?m.val||0:0;
  document.getElementById('mm-type').value=m?m.type||'sub':'sub';
  document.getElementById('mm-status').value=m?m.status||'estimated':'estimated';
  document.getElementById('mm-sj').value=m?m.sj||'':'';
  document.getElementById('mm-memo').value=m?m.memo||'':'';
  document.getElementById('mm-del').style.display=m?'inline-block':'none';
  document.getElementById('mkt-modal').classList.add('open');
  buildMktParent();
  if(m)document.getElementById('mm-parent').value=m.parentId||'';
}

function closeMktModal(){document.getElementById('mkt-modal').classList.remove('open');editMktId=null;}

function saveMkt(){
  const name=document.getElementById('mm-name').value.trim();if(!name)return toast('名前を入力してください');
  const parentRaw=document.getElementById('mm-parent').value;
  const entry={id:editMktId||state.nextMktId++,name,val:parseFloat(document.getElementById('mm-val').value)||0,
    type:document.getElementById('mm-type').value,parentId:parentRaw?parseInt(parentRaw):'',
    status:document.getElementById('mm-status').value,sj:document.getElementById('mm-sj').value,
    memo:document.getElementById('mm-memo').value,expanded:false};
  if(editMktId){const i=state.mkts.findIndex(m=>m.id===editMktId);if(i>=0)state.mkts[i]=entry;}
  else{state.mkts.push(entry);if(entry.parentId&&!state.expandedIds.includes(entry.parentId))state.expandedIds.push(entry.parentId);}
  saveState();closeMktModal();renderMkt();toast('保存しました');
}

function delMkt(){
  if(!editMktId)return;
  state.mkts=state.mkts.filter(m=>m.id!==editMktId&&String(m.parentId)!==String(editMktId));
  saveState();closeMktModal();renderMkt();toast('削除しました');
}

// ── SUMMARY ───────────────────────────────────────────────────
function renderSummary(){
  const sorted=[...state.comps].sort((a,b)=>tot(b)-tot(a));
  const ids=state.axes.map(a=>a.id),names=state.axes.map(a=>a.name);
  const sj=state.comps.find(c=>c.cat==='自社');
  document.getElementById('sum-table').innerHTML=`<table class="sum">
    <tr><th style="min-width:120px">競合</th>${ids.map((id,i)=>`<th>${names[i]}</th>`).join('')}<th>平均</th></tr>
    ${sorted.map(c=>{const color=CAT_COLORS[c.cat]||'#888';return `<tr class="${c.cat==='自社'?'self-row':''}">
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:5px;vertical-align:middle"></span>${c.name.length>14?c.name.slice(0,14)+'…':c.name}</td>
      ${ids.map(id=>`<td><div class="mini-bar-cell"><div class="mini-bar" style="width:${Math.round((c[id]||0)/2)}px;background:${color}"></div><span style="font-size:12px;font-weight:600;color:${(c[id]||0)>=70?color:'var(--text3)'}">${c[id]||0}</span></div></td>`).join('')}
      <td style="font-weight:700;color:${color}">${tot(c)}</td></tr>`;}).join('')}
  </table>`;
  if(sj){
    const gaps=ids.map((id,i)=>({name:names[i],gap:Math.max(...state.comps.filter(c=>c.cat!=='自社').map(c=>c[id]||0))-(sj[id]||0),sj:sj[id]||0,max:Math.max(...state.comps.filter(c=>c.cat!=='自社').map(c=>c[id]||0))})).sort((a,b)=>b.gap-a.gap);
    const strengths=ids.map((id,i)=>({name:names[i],val:sj[id]||0})).filter(x=>x.val>=70).sort((a,b)=>b.val-a.val);
    document.getElementById('sum-insight').innerHTML=`<strong>See Jay 競合比較インサイト</strong><br>
      強み：${strengths.length?strengths.map(s=>`${s.name}（${s.val}点）`).join('・'):'現時点で70点超の軸なし'}<br>
      最大ギャップ：${gaps[0].name}（自社${gaps[0].sj}点 vs 競合最高${gaps[0].max}点 / 差${gaps[0].gap}点）<br>
      次ギャップ：${gaps[1].name}（自社${gaps[1].sj}点 vs 競合最高${gaps[1].max}点 / 差${gaps[1].gap}点）<br>
      <strong>空白ポジション：</strong>「B2B対応力が高く・柔軟性も高い」象限に単独で存在しているのはSee Jayのみ。手配業取得後はサービス範囲でさらに差別化可能。`;
  }
}

// ── MODAL CLOSE ON BG ────────────────────────────────────────
['comp-modal','axis-modal','mkt-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('resize',()=>{if(currentView==='map')renderMap();});
loadState();
buildMapSelects();
renderMap();
</script>
</body>
