<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>See Jay — Market Intelligence v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f7f4;--bg3:#f1efe8;
  --text:#1a1a18;--text2:#5c5c58;--text3:#9c9a92;
  --bd:#e8e6de;--bd2:#d3d1c7;
  --pu:#534AB7;--pu-l:#EEEDFE;--pu-d:#3C3489;
  --te:#1D9E75;--te-l:#E1F5EE;--te-d:#085041;
  --co:#D85A30;--co-l:#FAECE7;
  --am:#BA7517;--am-l:#FAEEDA;
  --bl:#185FA5;--bl-l:#E6F1FB;
  --re:#E24B4A;--re-l:#FCEBEB;
  --gr:#3B6D11;--gr-l:#EAF3DE;
  --gy:#5F5E5A;--gy-l:#F1EFE8;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;--text:#e8e6de;--text2:#b4b2a9;--text3:#6c6a62;--bd:#3a3a36;--bd2:#4a4a46;
  --pu-l:#26215C;--te-l:#04342C;--co-l:#4A1B0C;--am-l:#412402;--bl-l:#042C53;--re-l:#501313;--gr-l:#173404;--gy-l:#2C2C2A;}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* HEADER */
.hdr{background:var(--bg);border-bottom:1px solid var(--bd);padding:0 16px;display:flex;align-items:center;gap:10px;height:52px;position:sticky;top:0;z-index:100}
.logo{font-weight:700;font-size:15px;color:var(--pu);white-space:nowrap;flex-shrink:0}
.logo span{color:var(--text2);font-weight:400;font-size:13px}
.nav{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap}
.nb{padding:5px 10px;border-radius:var(--r);border:none;background:none;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap}
.nb:hover{background:var(--bg3);color:var(--text)}
.nb.on{background:var(--pu-l);color:var(--pu);font-weight:500}
.svd{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--te-l);color:var(--te);display:none;flex-shrink:0}

/* MONTH BAR */
.mbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:6px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mbar label{font-size:12px;color:var(--text2)}
.mbar select{font-size:12px;padding:4px 8px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--text)}
.snap-btn{font-size:12px;padding:4px 12px;border-radius:var(--r);border:1px solid var(--te);color:var(--te);background:var(--te-l);cursor:pointer;font-weight:500}
.snap-btn:hover{background:var(--te);color:#fff}
.month-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--am-l);color:var(--am)}

/* LAYOUT */
.view{display:none;padding:16px;max-width:1200px;margin:0 auto}
.view.on{display:block}

/* FORM ELEMENTS */
select,input[type=text],input[type=number],input[type=url],textarea{font-size:13px;padding:6px 9px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--text);width:100%}
textarea{min-height:52px;resize:vertical}
input[type=range]{width:100%;padding:0;accent-color:var(--pu)}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--pu);cursor:pointer;flex-shrink:0}
button{font-size:12px;padding:6px 12px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--bg);color:var(--text);cursor:pointer;transition:background .15s}
button:hover{background:var(--bg3)}
.bp{background:var(--pu);color:#fff;border-color:var(--pu)}
.bp:hover{background:var(--pu-d)}
.bd-btn{color:var(--re);border-color:var(--re)}
.tb{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}

/* CARDS & PANELS */
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:8px}
.card.self{border-color:var(--re);border-width:2px}
.card-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;background:var(--bg2)}
.card-hd:hover{background:var(--bg3)}
.card-nm{font-weight:600;flex:1;font-size:14px}
.card-bd{display:none;border-top:1px solid var(--bd)}
.card-bd.on{display:block}

/* MAP */
#mwrap{position:relative;width:100%;padding-bottom:60%;border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:8px}
#mc{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}
.mc-ctrl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.mc-ctrl label{font-size:11px;color:var(--text2);white-space:nowrap}
.mc-ctrl select{width:auto;font-size:12px;padding:4px 8px}
.leg{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* SCORE BARS */
.br-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.br-l{font-size:11px;color:var(--text2);width:96px;flex-shrink:0}
.br-t{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.br-f{height:100%;border-radius:3px}
.br-v{font-size:11px;font-weight:700;min-width:24px;text-align:right}

/* TAG */
.tag{font-size:10px;padding:1px 7px;border-radius:20px;border:1px solid;display:inline-block;white-space:nowrap}

/* RAW DATA FORM */
.raw-form{padding:14px}
.rf-sect{margin-bottom:16px}
.rf-sect-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px}
.score-pill{font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;margin-left:auto}
.rf-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.rf-row label{font-size:12px;color:var(--text2);min-width:160px;flex-shrink:0;padding-top:6px;line-height:1.4}
.rf-row .inp{flex:1}
.rf-row .inp input[type=number]{max-width:120px}
.chk-group{display:flex;flex-direction:column;gap:6px}
.chk-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text)}
.pts{font-size:10px;color:var(--text3);margin-left:auto;flex-shrink:0}
.calc-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:var(--r);background:var(--bg3);margin-top:6px}
.calc-badge strong{font-size:14px;font-weight:700}

/* SUMMARY TABLE */
.sw{overflow-x:auto}
table.st{border-collapse:collapse;width:100%;font-size:11px;min-width:700px}
table.st th{padding:6px 8px;text-align:center;background:var(--bg2);border-bottom:2px solid var(--bd);font-weight:600;white-space:nowrap}
table.st th:first-child{text-align:left;min-width:110px}
table.st td{padding:5px 8px;border-bottom:1px solid var(--bd);text-align:center;vertical-align:middle}
table.st td:first-child{text-align:left;font-weight:500;white-space:nowrap}
table.st tr.s-row td{background:var(--re-l)}
table.st tr:hover td{background:var(--bg2)}
.cbc{display:flex;align-items:center;gap:3px;justify-content:center}
.mb{height:4px;border-radius:2px}
.ins{background:var(--pu-l);border:1px solid var(--pu);border-radius:var(--rl);padding:12px 14px;font-size:12px;color:var(--pu-d);line-height:1.7;margin-top:10px}

/* MARKET */
.mk-nd{border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:6px}
.mk-hd{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer}
.mk-hd:hover{background:var(--bg2)}
.mk-nm{font-weight:500;flex:1}
.mk-bw{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:30px;max-width:160px}
.mk-b{height:100%;border-radius:3px}
.mk-v{font-size:12px;font-weight:600;min-width:88px;text-align:right;white-space:nowrap}
.mk-mm{font-size:10px;color:var(--text3);padding:0 12px 8px;line-height:1.4}
.mk-ch{padding-left:12px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);padding:18px;width:94%;max-width:560px;max-height:88vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:700;margin-bottom:14px}
.mf{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.mf label{font-size:12px;color:var(--text2);min-width:90px;padding-top:6px;flex-shrink:0}
.mf .inp{flex:1}
.mf-row{display:flex;gap:6px;margin-top:10px}

.toast{position:fixed;bottom:20px;right:20px;background:var(--te);color:#fff;padding:9px 16px;border-radius:var(--rl);font-size:12px;font-weight:500;z-index:300;transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none}
.toast.on{transform:translateY(0);opacity:1}

/* MONTH COMPARE */
.compare-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
@media(max-width:600px){.compare-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">See Jay <span>Market Intelligence v3</span></div>
  <span class="svd" id="svd">保存済み ✓</span>
  <nav class="nav">
    <button class="nb on" onclick="go('map')">マップ</button>
    <button class="nb" onclick="go('scores')">競合スコア</button>
    <button class="nb" onclick="go('input')">データ入力</button>
    <button class="nb" onclick="go('market')">市場規模</button>
    <button class="nb" onclick="go('summary')">サマリー</button>
  </nav>
</header>

<!-- MONTH BAR -->
<div class="mbar">
  <label>表示月</label>
  <select id="month-sel" onchange="onMonthChange()"></select>
  <span class="month-badge" id="month-badge">最新</span>
  <button class="snap-btn" onclick="saveSnapshot()">📸 この月のスナップショットを保存</button>
  <span style="font-size:11px;color:var(--text2)" id="snap-list-label"></span>
</div>

<!-- MAP -->
<div id="view-map" class="view on">
  <div class="mc-ctrl">
    <label>横軸</label><select id="xAx"></select>
    <label>縦軸</label><select id="yAx"></select>
    <label>M</label><select id="fM"></select>
    <label>N</label><select id="fN"></select>
    <label>カテゴリ</label><select id="fCat"></select>
    <button onclick="resetMap()" style="margin-left:auto">リセット</button>
  </div>
  <div id="mwrap"><canvas id="mc"></canvas></div>
  <div class="leg" id="leg"></div>
</div>

<!-- SCORES -->
<div id="view-scores" class="view">
  <div class="tb">
    <select id="sc-cat" onchange="renderScores()" style="width:auto"><option>すべて</option><option>ガイド会社</option><option>OTA/プラットフォーム</option><option>総合旅行会社・DMC</option><option>フリーランスガイド</option><option>自社</option></select>
    <select id="sc-sort" onchange="renderScores()" style="width:auto"><option value="O">一致度順</option><option value="total">総合順</option><option value="name">名前順</option></select>
  </div>
  <div id="sc-list"></div>
</div>

<!-- DATA INPUT -->
<div id="view-input" class="view">
  <div class="tb">
    <label style="font-size:12px;color:var(--text2)">採点する競合を選択</label>
    <select id="inp-sel" onchange="loadRawForm()" style="width:auto;min-width:180px"></select>
    <button class="bp" onclick="addNewComp()">＋ 新規競合を追加</button>
  </div>
  <div id="raw-form-container"></div>
</div>

<!-- MARKET -->
<div id="view-market" class="view">
  <div class="tb">
    <button class="bp" onclick="openMktModal()">＋ 市場を追加</button>
    <button onclick="mktAll(true)">すべて展開</button>
    <button onclick="mktAll(false)">折りたたむ</button>
  </div>
  <div id="mk-list"></div>
</div>

<!-- SUMMARY -->
<div id="view-summary" class="view">
  <div class="tb">
    <label style="font-size:12px;color:var(--text2)">月比較</label>
    <select id="cmp-m1" style="width:auto"></select>
    <span style="color:var(--text2);font-size:12px">vs</span>
    <select id="cmp-m2" style="width:auto"></select>
    <button onclick="renderSummary()">比較表示</button>
  </div>
  <div class="sw" id="sum-tbl"></div>
  <div class="ins" id="sum-ins"></div>
</div>

<!-- MARKET MODAL -->
<div class="modal-bg" id="mm-modal">
<div class="modal">
  <h2 id="mm-title">市場を追加</h2>
  <div class="mf"><label>市場名</label><div class="inp"><input id="mm-name" type="text"></div></div>
  <div class="mf"><label>規模（億円）</label><div class="inp"><input id="mm-val" type="number" placeholder="0=要調査"></div></div>
  <div class="mf"><label>種別</label><div class="inp"><select id="mm-type"><option value="TAM">TAM</option><option value="SAM">SAM</option><option value="SOM">実戦用市場</option><option value="sub">サブ市場</option></select></div></div>
  <div class="mf"><label>親市場</label><div class="inp"><select id="mm-parent"><option value="">なし</option></select></div></div>
  <div class="mf"><label>ステータス</label><div class="inp"><select id="mm-status"><option value="confirmed">確定値</option><option value="estimated">推計値</option><option value="todo">要調査</option></select></div></div>
  <div class="mf"><label>See Jay関連</label><div class="inp"><select id="mm-sj"><option value="">-</option><option value="current">現在の主戦場</option><option value="target">狙える市場</option></select></div></div>
  <div class="mf"><label>メモ・出典</label><div class="inp"><input id="mm-memo" type="text"></div></div>
  <div class="mf-row">
    <button class="bp" onclick="saveMkt()">保存</button>
    <button onclick="closeMktModal()">キャンセル</button>
    <button class="bd-btn" id="mm-del" style="display:none;margin-left:auto" onclick="delMkt()">削除</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── COLOR MAPS ──────────────────────────────────────────────
const CC={'ガイド会社':'#1D9E75','OTA/プラットフォーム':'#BA7517','総合旅行会社・DMC':'#534AB7','フリーランスガイド':'#888780','手配業者':'#185FA5','自社':'#E24B4A'};
const MCC={'半日〜1日プライベートツアー':'#1D9E75','体験商品中心':'#BA7517','マーケットプレイス型商品':'#534AB7','パッケージツアー':'#185FA5','総合手配':'#D85A30','ガイドのみ':'#888780','複数日カスタムツアー':'#3B6D11','法人/旅行会社向け手配':'#E24B4A','その他':'#9c9a92'};
const NCC={'B2B受託型':'#1D9E75','ハイブリッド型':'#BA7517','マーケットプレイス型':'#534AB7','OTA依存型':'#185FA5','B2C直販型':'#D85A30','総合旅行手配型':'#888780'};
const TC={TAM:'#534AB7',SAM:'#1D9E75',SOM:'#D85A30',sub:'#888780'};
const TL={TAM:'TAM',SAM:'SAM',SOM:'実戦',sub:'サブ'};
const SL={confirmed:'確定',estimated:'推計',todo:'要調査'};
const SC={confirmed:'#1D9E75',estimated:'#BA7517',todo:'#888780'};

// ── AXIS DEFINITIONS ────────────────────────────────────────
const AXES=[
  {id:'A',name:'供給安定性',color:'#1D9E75',desc:'A1対応エリア数（40）＋A2対応言語数（20）＋A3公開商品数（40）'},
  {id:'B',name:'品質再現性',color:'#534AB7',desc:'B1平均評価（40）＋B2低評価率（40）＋B3品質担保文言（20）'},
  {id:'C',name:'B2B対応力',color:'#D85A30',desc:'チェック5項目×各20点'},
  {id:'D',name:'オペ柔軟性',color:'#BA7517',desc:'チェック5項目×各20点'},
  {id:'E',name:'商品設計柔軟性',color:'#185FA5',desc:'E1商品カテゴリ数（50）＋E2カスタム導線（50）'},
  {id:'F',name:'ブランド認知',color:'#3B6D11',desc:'F1 SNS規模（40）＋F2検索露出（40）＋F3外部掲載（20）'},
  {id:'G',name:'レビュー資産',color:'#E24B4A',desc:'対数補正: 100×log(1+R)/log(1+Rmax)'},
  {id:'H',name:'収益性（推定）',color:'#BA7517',desc:'H1価格帯（60）＋H2商品構成（40）'},
  {id:'I',name:'スケーラビリティ',color:'#534AB7',desc:'チェック5項目×各20点'},
  {id:'J',name:'チャネル支配力',color:'#1D9E75',desc:'J1自社予約（25）＋J2 OTA媒体数（25）＋J3 SNS頻度（25）＋J4 B2B導線（25）'},
  {id:'L',name:'規模（proxy）',color:'#888780',desc:'L1商品数（30）＋L2レビュー対数（40）＋L3掲載媒体数（30）'},
  {id:'O',name:'主力商品一致度',color:'#D85A30',desc:'See Jayの主力との競合度（条件分岐固定採点）'},
];

// ── SCORING FUNCTIONS ────────────────────────────────────────
function calcA(r){
  const a1=r.areas>=7?40:r.areas>=4?30:r.areas>=2?20:r.areas>=1?10:0;
  const a2=r.langs>=5?20:r.langs>=3?15:r.langs>=2?10:r.langs>=1?5:0;
  const a3=r.products>=51?40:r.products>=21?30:r.products>=6?20:r.products>=1?10:0;
  return a1+a2+a3;
}
function calcB(r){
  const b1=r.rating>=4.8?40:r.rating>=4.6?30:r.rating>=4.3?20:r.rating>=4.0?10:0;
  const lr=parseFloat(r.lowRate)||0;
  const b2=lr<3?40:lr<5?30:lr<10?20:lr<15?10:0;
  const b3=(r.bReview?5:0)+(r.bTrain?5:0)+(r.bQuality?5:0)+(r.bSupport?5:0);
  return b1+b2+b3;
}
function calcC(r){
  return (r.cPage?20:0)+(r.cWord?20:0)+(r.cContact?20:0)+(r.cProcess?20:0)+(r.cResult?20:0);
}
function calcD(r){
  return (r.dCustom?20:0)+(r.dTailor?20:0)+(r.dShort?20:0)+(r.dChange?20:0)+(r.dRequest?20:0);
}
function calcE(r){
  const e1=r.cats>=6?50:r.cats>=4?35:r.cats>=2?20:r.cats>=1?10:0;
  const e2=(r.eForm?25:0)+(r.eCustom?25:0);
  return e1+e2;
}
function calcF(r){
  const sns=parseInt(r.snsFollowers)||0;
  const f1=sns>=100000?40:sns>=30000?30:sns>=10000?20:sns>=1000?10:0;
  const kw=parseInt(r.kwHits)||0;
  const f2=kw>=5?40:kw>=4?30:kw>=3?20:kw>=1?10:0;
  const f3=(r.fMedia?5:0)+(r.fAward?5:0)+(r.fPR?5:0)+(r.fTravel?5:0);
  return f1+f2+f3;
}
function calcG(r,allComps){
  const R=parseInt(r.totalReviews)||0;
  const Rmax=Math.max(...allComps.map(c=>parseInt(c.raw?.totalReviews)||0),1);
  if(R===0)return 0;
  return Math.round(100*Math.log(1+R)/Math.log(1+Rmax));
}
function calcH(r){
  const p=parseInt(r.price1day)||0;
  const h1=p>=70000?60:p>=50000?45:p>=35000?30:p>=20000?15:0;
  const h2map={'ガイドのみ':40,'ガイド＋一部手配':30,'複数日カスタム':30,'総合手配':25,'マーケットプレイス':20,'低単価体験':10,'不明':20};
  const h2=h2map[r.productType]||20;
  return h1+h2;
}
function calcI(r){
  return (r.iUniform?20:0)+(r.iBrand?20:0)+(r.iCompany?20:0)+(r.iOrg?20:0)+(r.iMulti?20:0);
}
function calcJ(r){
  const j1map={'自社で予約完結':25,'問い合わせのみ':15,'なし':0};
  const j1=j1map[r.j1]||0;
  const ota=parseInt(r.otaCount)||0;
  const j2=ota>=4?25:ota>=3?20:ota>=2?15:ota>=1?10:0;
  const j3map={'週3回以上':25,'週1〜2回':15,'月1〜3回':5,'ほぼなし':0};
  const j3=j3map[r.snsFreq]||0;
  const j4map={'法人向けページあり':25,'問い合わせ窓口のみ':15,'なし':0};
  const j4=j4map[r.j4]||0;
  return j1+j2+j3+j4;
}
function calcL(r,allComps){
  const p=parseInt(r.products)||0;
  const l1=p>=51?30:p>=21?20:p>=6?10:p>=1?5:0;
  const R=parseInt(r.totalReviews)||0;
  const Rmax=Math.max(...allComps.map(c=>parseInt(c.raw?.totalReviews)||0),1);
  const l2=R>0?Math.round(40*Math.log(1+R)/Math.log(1+Rmax)):0;
  const m=parseInt(r.otaCount)||0;
  const l3=m>=4?30:m>=3?20:m>=2?15:m>=1?10:0;
  return l1+l2+l3;
}
function calcO(r){
  const en=r.oEng?1:0,gd=r.oGuide?1:0,b2=r.oB2B?1:0,jp=r.oJapan?1:0;
  const s=en+gd+b2+jp;
  if(s>=4)return 100;if(s>=3)return 75;if(s>=2)return 50;
  if(r.oPartial)return 25;return 0;
}

function calcAll(comp,allComps){
  const r=comp.raw||{};
  const scores={
    A:calcA(r),B:calcB(r),C:calcC(r),D:calcD(r),E:calcE(r),
    F:calcF(r),G:calcG(r,allComps),H:calcH(r),I:calcI(r),
    J:calcJ(r),L:calcL(r,allComps),O:calcO(r)
  };
  return scores;
}

function tot(scores){
  const vals=AXES.map(a=>scores[a.id]||0);
  return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
}

let S; // {comps, mkts, snapshots:{[yyyymm]:{comps}}, nextCompId, nextMktId, expandedIds}
let currentMonth='latest'; // 'latest' or 'yyyymm'
let cv='map';

function loadS(){
  try{
    const r=localStorage.getItem('sj-v3');
    S=r?JSON.parse(r):null;
  }catch(e){S=null;}
  if(!S){
    S={comps:JSON.parse(JSON.stringify(DEFAULT_COMPS)),mkts:JSON.parse(JSON.stringify(DEFAULT_MKTS)),snapshots:{},nextCompId:200,nextMktId:1000,expandedIds:[901,904,101,102,103]};
  }
  if(!S.snapshots)S.snapshots={};
  if(!S.expandedIds)S.expandedIds=[901,904,101,102,103];
}
function saveS(){
  try{localStorage.setItem('sj-v3',JSON.stringify(S));const b=document.getElementById('svd');b.style.display='inline';setTimeout(()=>b.style.display='none',2000);}
  catch(e){}
}

// 現在表示中のcomps（月選択に応じて変わる）
function activeComps(){
  if(currentMonth==='latest')return S.comps;
  return S.snapshots[currentMonth]||S.comps;
}

// ── MONTH MANAGEMENT ─────────────────────────────────────────
function buildMonthBar(){
  const sel=document.getElementById('month-sel');
  const months=Object.keys(S.snapshots).sort().reverse();
  sel.innerHTML=`<option value="latest">最新（編集中）</option>`+months.map(m=>`<option value="${m}">${fmtMonth(m)}</option>`).join('');
  sel.value=currentMonth;
  // compare selects
  ['cmp-m1','cmp-m2'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.innerHTML=`<option value="latest">最新</option>`+months.map(m=>`<option value="${m}">${fmtMonth(m)}</option>`).join('');
    el.value=i===0?(months[1]||'latest'):'latest';
  });
  document.getElementById('snap-list-label').textContent=months.length?`保存済み：${months.length}ヶ月分`:'';
}

function fmtMonth(ym){
  return ym.slice(0,4)+'年'+ym.slice(4)+'月';
}

function onMonthChange(){
  currentMonth=document.getElementById('month-sel').value;
  const badge=document.getElementById('month-badge');
  badge.textContent=currentMonth==='latest'?'最新':fmtMonth(currentMonth)+' のデータ';
  badge.style.background=currentMonth==='latest'?'var(--te-l)':'var(--am-l)';
  badge.style.color=currentMonth==='latest'?'var(--te)':'var(--am)';
  renderAll();
}

function saveSnapshot(){
  const now=new Date();
  const ym=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
  const label=fmtMonth(ym);
  if(S.snapshots[ym]){
    if(!confirm(`${label}のスナップショットは既に存在します。上書きしますか？`))return;
  }
  S.snapshots[ym]=JSON.parse(JSON.stringify(S.comps));
  saveS();buildMonthBar();toast(`${label}のスナップショットを保存しました`);
}

function go(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  document.querySelectorAll('.nb')[['map','scores','input','market','summary'].indexOf(v)].classList.add('on');
  cv=v;
  if(v==='map')setTimeout(renderMap,50);
  if(v==='scores')renderScores();
  if(v==='input')renderInputTab();
  if(v==='market')renderMkt();
  if(v==='summary')renderSummary();
}

function renderAll(){
  if(cv==='map')renderMap();
  if(cv==='scores')renderScores();
  if(cv==='summary')renderSummary();
}

let xId='O',yId='C',fM='すべて',fN='すべて',fCat='すべて';

function buildMapSel(){
  const bld=(id,cur,opts)=>{const el=document.getElementById(id);if(!el)return;el.innerHTML=opts.map(o=>`<option value="${o}">${o}</option>`).join('');el.value=cur;};
  bld('xAx',xId,AXES.map(a=>a.id));
  bld('yAx',yId,AXES.map(a=>a.id));
  document.getElementById('xAx').options && [...document.getElementById('xAx').options].forEach((o,i)=>{o.text=AXES[i].id+' '+AXES[i].name;});
  document.getElementById('yAx').options && [...document.getElementById('yAx').options].forEach((o,i)=>{o.text=AXES[i].id+' '+AXES[i].name;});
  document.getElementById('xAx').value=xId;document.getElementById('yAx').value=yId;
  document.getElementById('xAx').onchange=e=>{xId=e.target.value;renderMap();};
  document.getElementById('yAx').onchange=e=>{yId=e.target.value;renderMap();};
  const comps=S.comps;
  const mVals=['すべて',...new Set(comps.map(c=>c.M||'').filter(Boolean))];
  const nVals=['すべて',...new Set(comps.map(c=>c.N||'').filter(Boolean))];
  bld('fM',fM,mVals);bld('fN',fN,nVals);
  bld('fCat',fCat,['すべて',...Object.keys(CC)]);
  document.getElementById('fM').onchange=e=>{fM=e.target.value;renderMap();};
  document.getElementById('fN').onchange=e=>{fN=e.target.value;renderMap();};
  document.getElementById('fCat').onchange=e=>{fCat=e.target.value;renderMap();};
}

function getScores(c){return calcAll(c,activeComps());}

function renderMap(){
  const wrap=document.getElementById('mwrap'),canvas=document.getElementById('mc');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  if(!W||!H)return;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);
  const PAD={l:50,r:16,t:20,b:48};
  const pw=W-PAD.l-PAD.r,ph=H-PAD.t-PAD.b;
  const xA=AXES.find(a=>a.id===xId)||AXES[0];
  const yA=AXES.find(a=>a.id===yId)||AXES[0];
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
  const ac=isDark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.18)';
  const tc=isDark?'rgba(255,255,255,0.36)':'rgba(0,0,0,0.32)';
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle=gc;ctx.lineWidth=0.5;
  [25,50,75].forEach(v=>{
    const gx=PAD.l+pw*v/100,gy=PAD.t+ph*(1-v/100);
    ctx.beginPath();ctx.moveTo(gx,PAD.t);ctx.lineTo(gx,PAD.t+ph);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD.l,gy);ctx.lineTo(PAD.l+pw,gy);ctx.stroke();
  });
  ctx.strokeStyle=ac;ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+ph);ctx.stroke();
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t+ph);ctx.lineTo(PAD.l+pw,PAD.t+ph);ctx.stroke();
  ctx.fillStyle=tc;ctx.font='11px sans-serif';
  ctx.textAlign='center';ctx.fillText(xA.name,PAD.l+pw/2,PAD.t+ph+34);
  ctx.textAlign='left';ctx.fillText('低',PAD.l,PAD.t+ph+16);ctx.fillText('高',PAD.l+pw-10,PAD.t+ph+16);
  ctx.save();ctx.translate(15,PAD.t+ph/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';ctx.fillText(yA.name,0,0);ctx.restore();
  ctx.textAlign='start';ctx.fillText('高',2,PAD.t+7);ctx.fillText('低',2,PAD.t+ph);
  const comps=activeComps();
  const filtered=comps.filter(c=>{
    if(fM!=='すべて'&&c.M!==fM)return false;
    if(fN!=='すべて'&&c.N!==fN)return false;
    if(fCat!=='すべて'&&c.cat!==fCat)return false;
    return true;
  });
  filtered.forEach(c=>{
    const sc=getScores(c);
    const xv=sc[xId]||0,yv=sc[yId]||0;
    const x=PAD.l+pw*xv/100,y=PAD.t+ph*(1-yv/100);
    const color=CC[c.cat]||'#888';
    const r=c.cat==='自社'?10:7;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=color+(c.cat==='自社'?'ff':'cc');ctx.fill();
    if(c.cat==='自社'){ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();}
    ctx.fillStyle=isDark?'rgba(255,255,255,0.9)':'rgba(0,0,0,0.8)';
    ctx.font=c.cat==='自社'?'700 11px sans-serif':'11px sans-serif';
    ctx.textAlign='left';ctx.fillText(c.name,x+r+4,y+4);
  });
  document.getElementById('leg').innerHTML=Object.entries(CC).map(([cat,col])=>{
    const n=comps.filter(c=>c.cat===cat).length;
    return n?`<div class="li"><div class="ld" style="background:${col}"></div>${cat}（${n}）</div>`:'';
  }).join('');
  canvas.onclick=e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    let hit=null;
    filtered.forEach(c=>{
      const sc=getScores(c);
      const x=PAD.l+pw*(sc[xId]||0)/100,y=PAD.t+ph*(1-(sc[yId]||0)/100);
      if(Math.sqrt((mx-x)**2+(my-y)**2)<14)hit=c;
    });
    if(hit){go('input');setTimeout(()=>{document.getElementById('inp-sel').value=hit.id;loadRawForm();},100);}
  };
}

function resetMap(){xId='O';yId='C';fM='すべて';fN='すべて';fCat='すべて';buildMapSel();renderMap();}

// ── SCORES ───────────────────────────────────────────────────
function renderScores(){
  const catF=document.getElementById('sc-cat').value;
  const sortF=document.getElementById('sc-sort').value;
  const comps=activeComps();
  let list=[...comps].filter(c=>catF==='すべて'||c.cat===catF);
  list.forEach(c=>{c._sc=calcAll(c,comps);c._tot=tot(c._sc);});
  if(sortF==='O')list.sort((a,b)=>(b._sc.O||0)-(a._sc.O||0));
  else if(sortF==='total')list.sort((a,b)=>b._tot-a._tot);
  else list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  document.getElementById('sc-list').innerHTML=list.map(c=>{
    const color=CC[c.cat]||'#888';
    const mc=MCC[c.M]||'#888';const nc=NCC[c.N]||'#888';
    return `<div class="card${c.cat==='自社'?' self':''}">
      <div class="card-hd" onclick="toggleCard('sc-${c.id}')">
        <span class="card-nm">${c.name}</span>
        <span class="tag" style="color:${mc};border-color:${mc}">M:${c.M||'-'}</span>
        <span class="tag" style="color:${nc};border-color:${nc}">N:${c.N||'-'}</span>

function renderInputTab(){

function addNewComp(){

function autoCalc(){
  const sel=document.getElementById('inp-sel');
  const comp=S.comps.find(c=>String(c.id)===String(sel.value));
  if(!comp)return;
  const tmp={...comp,raw:readRaw()};
  const tmpAll=S.comps.map(c=>String(c.id)===String(sel.value)?tmp:c);
  const sc=calcAll(tmp,tmpAll);
  AXES.forEach(a=>{
    const el=document.getElementById('calc-'+a.id);
    if(el){
      const strong=el.querySelector('strong');
      if(strong){strong.textContent=sc[a.id]+'点';strong.style.color=a.color;}
    }
  });
}

function readRaw(){
  const g=id=>{const el=document.getElementById('ri-'+id);if(!el)return undefined;if(el.type==='checkbox')return el.checked;if(el.type==='number')return parseFloat(el.value)||0;return el.value;};
  return mkRaw({
    areas:g('areas'),langs:g('langs'),products:g('products'),
    rating:g('rating'),lowRate:g('lowRate'),
    bReview:g('bReview'),bTrain:g('bTrain'),bQuality:g('bQuality'),bSupport:g('bSupport'),
    cPage:g('cPage'),cWord:g('cWord'),cContact:g('cContact'),cProcess:g('cProcess'),cResult:g('cResult'),
    dCustom:g('dCustom'),dTailor:g('dTailor'),dShort:g('dShort'),dChange:g('dChange'),dRequest:g('dRequest'),
    cats:g('cats'),eForm:g('eForm'),eCustom:g('eCustom'),
    snsFollowers:g('snsFollowers'),kwHits:g('kwHits'),
    fMedia:g('fMedia'),fAward:g('fAward'),fPR:g('fPR'),fTravel:g('fTravel'),
    totalReviews:g('totalReviews'),price1day:g('price1day'),productType:g('productType'),
    iUniform:g('iUniform'),iBrand:g('iBrand'),iCompany:g('iCompany'),iOrg:g('iOrg'),iMulti:g('iMulti'),
    j1:g('j1'),otaCount:g('otaCount'),snsFreq:g('snsFreq'),j4:g('j4'),
    oEng:g('oEng'),oGuide:g('oGuide'),oB2B:g('oB2B'),oJapan:g('oJapan'),oPartial:g('oPartial'),
  });
}

function saveRawForm(){
  const sel=document.getElementById('inp-sel');
  const idx=S.comps.findIndex(c=>String(c.id)===String(sel.value));
  if(idx<0)return;
  S.comps[idx].name=document.getElementById('ri-name').value.trim()||S.comps[idx].name;
  S.comps[idx].cat=document.getElementById('ri-cat').value;
  S.comps[idx].M=document.getElementById('ri-M').value;
  S.comps[idx].N=document.getElementById('ri-N').value;
  S.comps[idx].memo=document.getElementById('ri-memo').value;
  S.comps[idx].src=document.getElementById('ri-src').value;
  S.comps[idx].raw=readRaw();
  saveS();buildMapSel();toast('保存しました');
}

function deleteComp(){
  const sel=document.getElementById('inp-sel');
  const comp=S.comps.find(c=>String(c.id)===String(sel.value));
  if(!comp)return;
  if(!confirm(`「${comp.name}」を削除しますか？`))return;
  S.comps=S.comps.filter(c=>String(c.id)!==String(sel.value));
  saveS();buildMapSel();renderInputTab();toast('削除しました');
}

// ── SUMMARY ──────────────────────────────────────────────────
function renderSummary(){
  const m1=document.getElementById('cmp-m1')?.value||'latest';
  const m2=document.getElementById('cmp-m2')?.value||'latest';
  const comps1=m1==='latest'?S.comps:(S.snapshots[m1]||S.comps);
  const comps2=m2==='latest'?S.comps:(S.snapshots[m2]||S.comps);
  const allIds=[...new Set([...comps1.map(c=>c.id),...comps2.map(c=>c.id)])];
  const sj=S.comps.find(c=>c.cat==='自社');

  const rows=allIds.map(id=>{
    const c1=comps1.find(c=>c.id===id);
    const c2=comps2.find(c=>c.id===id);
    const comp=c1||c2;
    const sc1=c1?calcAll(c1,comps1):{};
    const sc2=c2?calcAll(c2,comps2):{};
    const color=CC[comp.cat]||'#888';
    const t1=c1?tot(sc1):'-';const t2=c2?tot(sc2):'-';
    const sameMonth=m1===m2;
    return `<tr class="${comp.cat==='自社'?'s-row':''}">
      <td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${color};margin-right:4px;vertical-align:middle"></span>${comp.name.length>12?comp.name.slice(0,12)+'…':comp.name}</td>
      ${AXES.map(a=>{
        const v1=sc1[a.id]||0,v2=sc2[a.id]||0;
        const diff=v1-v2;
        const diffStr=sameMonth?'':(diff>0?`<span style="color:var(--te);font-size:9px">▲${diff}</span>`:(diff<0?`<span style="color:var(--re);font-size:9px">▼${Math.abs(diff)}</span>`:''));
        return `<td><div class="cbc"><div class="mb" style="width:${Math.round(v2/2)}px;background:${color};opacity:0.3"></div><div class="mb" style="width:${Math.round(v1/2)}px;background:${color};margin-left:-${Math.round(v2/2)}px"></div><span style="font-size:10px;font-weight:700;color:${v1>=70?color:'var(--text3)'}">${v1}</span>${diffStr}</div></td>`;
      }).join('')}
      <td style="font-weight:700;color:${color}">${t1}</td>
    </tr>`;
  }).join('');

  document.getElementById('sum-tbl').innerHTML=`<table class="st">
    <tr><th>競合</th>${AXES.map(a=>`<th title="${a.name}">${a.id}</th>`).join('')}<th>平均</th></tr>
    ${rows}
  </table>`;

  if(sj){
    const sjSc=calcAll(sj,S.comps);
    const gaps=AXES.map(a=>({name:a.name,gap:Math.max(...S.comps.filter(c=>c.cat!=='自社').map(c=>calcAll(c,S.comps)[a.id]||0))-(sjSc[a.id]||0),sj:sjSc[a.id]||0,max:Math.max(...S.comps.filter(c=>c.cat!=='自社').map(c=>calcAll(c,S.comps)[a.id]||0))})).sort((a,b)=>b.gap-a.gap);
    const strengths=AXES.map(a=>({name:a.name,val:sjSc[a.id]||0})).filter(x=>x.val>=70).sort((a,b)=>b.val-a.val);
    document.getElementById('sum-ins').innerHTML=`<strong>See Jay インサイト</strong><br>
      強み：${strengths.length?strengths.map(s=>`${s.name}（${s.val}点）`).join('・'):'現時点で70点超なし'}<br>
      最大ギャップ：${gaps[0].name}（自社${gaps[0].sj}点 vs 競合最高${gaps[0].max}点 / 差${gaps[0].gap}点）<br>
      次ギャップ：${gaps[1].name}（自社${gaps[1].sj}点 vs 競合最高${gaps[1].max}点 / 差${gaps[1].gap}点）<br>
      <strong>空白ポジション：</strong>C B2B対応力×D オペ柔軟性×O主力商品一致度の高い組み合わせはSee Jayのみ。`;
  }
}

// ── MARKET ───────────────────────────────────────────────────
let editMId=null;
function mktAll(exp){if(exp)S.mkts.forEach(m=>{if(!S.expandedIds.includes(m.id))S.expandedIds.push(m.id);});else S.expandedIds=[];saveS();renderMkt();}
function fmt(v){if(!v||v===0)return '要調査';if(v>=10000)return (v/10000).toFixed(1)+'兆円';return v.toLocaleString()+'億円';}
function renderMkt(){
  const maxV=Math.max(...S.mkts.map(m=>m.val||0),1);
  const roots=S.mkts.filter(m=>!m.parentId&&m.parentId!==0);
  const el=document.getElementById('mk-list');el.innerHTML='';
  roots.forEach(r=>el.appendChild(buildMktNode(r,maxV,0)));
  buildMktParent();
}
function buildMktNode(node,maxV,depth){
  const children=S.mkts.filter(m=>String(m.parentId)===String(node.id));
  const isExp=S.expandedIds.includes(node.id);
  const color=TC[node.type]||'#888';
  const pct=node.val&&maxV>0?Math.round(node.val/maxV*100):0;
  const el=document.createElement('div');el.className='mk-nd';el.style.marginLeft=(depth*12)+'px';
  const hd=document.createElement('div');hd.className='mk-hd';
  hd.innerHTML=`<span style="font-size:11px;color:var(--text3);width:12px;flex-shrink:0;cursor:pointer" onclick="toggleMkt(${node.id})">${children.length?(isExp?'▼':'▶'):' '}</span>
    <span class="mk-nm" style="font-size:${Math.max(11,13-depth)}px">${node.name}</span>
    <div class="mk-bw"><div class="mk-b" style="width:${pct}%;background:${color}"></div></div>
    <span class="mk-v" style="color:${color};font-size:${Math.max(11,13-depth)}px">${fmt(node.val)}</span>
    <span class="tag" style="color:${color};border-color:${color}">${TL[node.type]||''}</span>
    <span class="tag" style="color:${SC[node.status]};border-color:${SC[node.status]}">${SL[node.status]||''}</span>
    ${node.sj==='current'?'<span class="tag" style="color:var(--re);border-color:var(--re)">主戦場</span>':''}
    ${node.sj==='target'?'<span class="tag" style="color:var(--te);border-color:var(--te)">狙い目</span>':''}
    <button style="font-size:10px;height:22px;margin-left:4px;flex-shrink:0" onclick="openMktModal(${node.id})">編集</button>`;
  el.appendChild(hd);
  if(node.memo){const m=document.createElement('div');m.className='mk-mm';m.textContent=node.memo;el.appendChild(m);}
  if(children.length&&isExp){const cw=document.createElement('div');cw.className='mk-ch';children.forEach(c=>cw.appendChild(buildMktNode(c,maxV,depth+1)));el.appendChild(cw);}
  return el;
}
function toggleMkt(id){const i=S.expandedIds.indexOf(id);if(i>=0)S.expandedIds.splice(i,1);else S.expandedIds.push(id);saveS();renderMkt();}
function buildMktParent(){const sel=document.getElementById('mm-parent');if(!sel)return;sel.innerHTML='<option value="">なし</option>'+S.mkts.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');}
function openMktModal(id=null){
  editMId=id;const m=id?S.mkts.find(x=>x.id==id):null;
  document.getElementById('mm-title').textContent=m?m.name+' を編集':'市場を追加';
  document.getElementById('mm-name').value=m?m.name:'';document.getElementById('mm-val').value=m?m.val||0:0;
  document.getElementById('mm-type').value=m?m.type||'sub':'sub';document.getElementById('mm-status').value=m?m.status||'estimated':'estimated';
  document.getElementById('mm-sj').value=m?m.sj||'':'';document.getElementById('mm-memo').value=m?m.memo||'':'';
  document.getElementById('mm-del').style.display=m?'inline-block':'none';
  document.getElementById('mm-modal').classList.add('on');buildMktParent();
  if(m)document.getElementById('mm-parent').value=m.parentId||'';
}
function closeMktModal(){document.getElementById('mm-modal').classList.remove('on');editMId=null;}
function saveMkt(){
  const name=document.getElementById('mm-name').value.trim();if(!name)return toast('名前を入力してください');
  const pr=document.getElementById('mm-parent').value;
  const entry={id:editMId||S.nextMktId++,name,val:parseFloat(document.getElementById('mm-val').value)||0,type:document.getElementById('mm-type').value,parentId:pr?parseInt(pr):'',status:document.getElementById('mm-status').value,sj:document.getElementById('mm-sj').value,memo:document.getElementById('mm-memo').value};
  if(editMId){const i=S.mkts.findIndex(m=>m.id===editMId);if(i>=0)S.mkts[i]=entry;}
  else{S.mkts.push(entry);if(entry.parentId&&!S.expandedIds.includes(entry.parentId))S.expandedIds.push(entry.parentId);}
  saveS();closeMktModal();renderMkt();toast('保存しました');
}
function delMkt(){if(!editMId)return;S.mkts=S.mkts.filter(m=>m.id!==editMId&&String(m.parentId)!==String(editMId));saveS();closeMktModal();renderMkt();toast('削除しました');}

// ── MODAL CLOSE ──────────────────────────────────────────────
document.getElementById('mm-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});
window.addEventListener('resize',()=>{if(cv==='map')renderMap();});

// ── INIT ─────────────────────────────────────────────────────
loadS();buildMapSel();buildMonthBar();renderMap();
</script>
